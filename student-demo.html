// ── PII SCRUB ─────────────────────────────────────────────────────────────
function scrub(t){
  return t.replace(/\b\d{3}[-.]?\d{3}[-.]?\d{4}\b/g,"[redacted]")
          .replace(/\b[A-Z][a-z]{2,} [A-Z][a-z]{2,}\b/g,"[name]");
}

// ── READINESS CHECK ───────────────────────────────────────────────────────
function isReady(msgs){
  const mine=msgs.filter(m=>m.from==="student").slice(-4);
  if(mine.length<2)return false;
  const combined=mine.map(m=>m.text.toLowerCase()).join(" ");
  const hits=PROBLEM.readyWords.filter(w=>combined.includes(w.toLowerCase()));
  return combined.length>50&&hits.length>=2;
}

// ── SOCRATIC ENGINE ───────────────────────────────────────────────────────
function getResponse(raw,spanish,name,phase,count){
  const t=scrub(raw).toLowerCase();

  // ── CONTEXT PHASE ─────────────────────────────────────────────────────
  if(phase==="context"){
    const hasCommunity = /yes|sí|si\b|school|escuela|church|iglesia|raised|sold|recaudamos|vendimos|money|dinero|community|comunidad|fundraiser|recaudación/.test(t);
    if(hasCommunity){
      return {
        text:`${name}, that experience you just described — that is exactly the kind of math we are about to do. You already understand what a fundraiser is from your own life.\n\nIn Brilla, your thinking in Spanish is just as mathematical as your thinking in English. Always.\n\nNow let's read today's problem together. We are going to read it three times — each time for a different purpose.`,
        phase:"read1_intro"
      };
    }
    return {
      text:`${name}, that is okay — let's talk about what a fundraiser is.\n\nA fundraiser is when people sell things or do activities to collect money for something they care about. Your school might raise money for a class trip, new books, or community supplies.\n\n🇲🇽 In Spanish: recaudación de fondos. "Recaudar" means to collect or raise. "Fondos" means funds or money.\n\nHave you ever seen something like this at school, at church, or in your neighborhood — even if you did not know it was called a fundraiser?`,
      phase:"context"
    };
  }

  // ── READ 1 INTRO ──────────────────────────────────────────────────────
  if(phase==="read1_intro"){
    return {
      text:`First read — just the story. The numbers are hidden for now.\n\nRead it and tell me: What is happening? Who is involved? What are they doing?\n\nDo not worry about math yet. Just the story.`,
      phase:"read1"
    };
  }

  // ── READ 1 ────────────────────────────────────────────────────────────
  if(phase==="read1"){
    const hasStory = /school|fundraiser|selling|candles|grade|uptown|recaudación|vendiendo|grado/.test(t) || t.length > 20;
    if(hasStory){
      return {
        text:`Good, ${name}. You understood the story.\n\nNow for the second read — the numbers are revealed.\n\nThis time: What are the numbers in the problem? What does each number mean in this situation?`,
        phase:"read2"
      };
    }
    return {
      text:`${name}, just tell me what is happening in the story — in your own words, in English or Spanish. Who is involved? What are they doing?`,
      phase:"read1"
    };
  }

  // ── READ 2 ────────────────────────────────────────────────────────────
  if(phase==="read2"){
    const hasQuantities = /24|13|boxes|candles|costs|each|price|cajas|cada|cuesta/.test(t);
    if(hasQuantities){
      return {
        text:`${name}, you identified the quantities. Let me confirm:\n\n📦 24 = the number of boxes Grade 4 sold\n💵 $13 = the cost of each box\n\nNow for the third and final read.\n\nThis time: What is the problem asking you to find? What is the question?`,
        phase:"read3"
      };
    }
    return {
      text:`${name}, look at the numbers in the problem. What are they? And what does each one mean in the story about the fundraiser?`,
      phase:"read2"
    };
  }

  // ── READ 3 ────────────────────────────────────────────────────────────
  if(phase==="read3"){
    const hasQuestion = /total|altogether|how much|money|raised|en total|cuánto|recaudaron|multiply|multiplicar/.test(t);
    if(hasQuestion){
      return {
        text:`${name}, exactly. The question is: how much money did Grade 4 raise altogether?\n\nBefore you start calculating, I want to ask you one more thing.\n\nIf you had 24 boxes and each cost $13 — what operation would you use to find the total? And why does that operation make sense here?`,
        phase:"building"
      };
    }
    return {
      text:`${name}, read the last sentence of the problem one more time. What is it asking you to find?`,
      phase:"read3"
    };
  }

  // ── BUILDING ─────────────────────────────────────────────────────────
  if(/answer|just tell|give me|dime la/.test(t)){
    return {
      text:spanish
        ?`${name}, la respuesta ya está en tu pensamiento.\n\nPrimero dime: ¿qué operación usarías y por qué? / What operation would you use and why?`
        :`${name}, the answer is not mine to give. It already lives in your thinking.\n\nFirst tell me: what operation would you use here and why does it make sense for this situation?`,
      phase:"building"
    };
  }

  if(/multiply|multiplication|multiplicar|times|veces/.test(t)){
    return {
      text:`${name}, multiplication is exactly right. And here is why that matters — you did not just pick an operation. You understood why it fits.\n\nWhen you have equal groups — 24 boxes, each costing the same amount — multiplication finds the total.\n\nNow look at your area model. Can you decompose 24 and 13 using place value before you multiply?`,
      phase:"building"
    };
  }

  if(/area model|modelo de área|decompose|descomponer|partial|parcial/.test(t)){
    return {
      text:`${name}, you are using the right tool. Let's build it together.\n\n24 = 20 + 4\n13 = 10 + 3\n\nYour area model has four sections. Start with the largest one. What is 20 × 10?`,
      phase:"building"
    };
  }

  if(/200|sixty|60|forty|40|twelve|12/.test(t)){
    return {
      text:`${name}, you are finding the partial products. That is exactly the strategy.\n\nNow — you have found some of the four sections. What are all four partial products? And what do you get when you add them all together?`,
      phase:"building"
    };
  }

  if(/stuck|confused|don't know|no sé|help/.test(t)){
    return {
      text:`Being stuck is part of the process, ${name}. Let's go smaller.\n\nLook at just one section of the area model — the top left. It says 20 × 10. What is that?\n\nJust that one section. Nothing else yet.`,
      phase:"building"
    };
  }

  // CFU phases
  if(phase==="cfu_wait"){
    if(/\d/.test(t))return{text:`${name}, walk me through how you got there. What did you fill into each section of the area model? What were your four partial products?`,phase:"cfu_explain"};
    return{text:`Take your time, ${name}. Solve it in your workbook using the area model. Come back and tell me your answer when you have it.`,phase:"cfu_wait"};
  }

  if(phase==="cfu_explain"){
    const ok=/(200|60|40|12|312|area model|partial|multiply|decompose|multiplicar|producto)/.test(t);
    if(ok)return{
      text:`${name}, that is clear mathematical reasoning. You decomposed the factors, used the area model to find partial products, and added them together. That is exactly how 4.NBT.B.5 works.\n\n✨ You are ready to work through the rest in your workbook. Write your strategy before you go.`,
      phase:"released",signal:true
    };
    return{text:`${name}, tell me about the area model specifically. What did you put in each of the four sections?`,phase:"cfu_explain"};
  }

  const fallbacks=[
    `${name}, you are thinking. Keep going. What does that tell you about the next step?`,
    `Interesting, ${name}. Can you connect that to the area model?`,
    `${name}, say more. How does what you just said help you find the total?`,
    `Good thinking, ${name}. What would happen if you tried that with the actual numbers?`,
    `${name}, I hear you. What is the very next small step you could take?`,
  ];
  return{text:fallbacks[count%fallbacks.length],phase:"building"};
}

      {/* Row headers */}
      <text x={18} y={tpad+row0/2+5} textAnchor="middle" fontSize="14" fontWeight="800" fill={C.navy}>10</text>
      <text x={18} y={tpad+row0+row1/2+5} textAnchor="middle" fontSize="14" fontWeight="800" fill={C.navy}>3</text>
      {/* Cells */}
      {[
        {x:lpad,y:tpad,w:col0,h:row0,bg:C.tealPale,border:C.teal,val:"200",label:"20×10",color:C.teal},
        {x:lpad+col0,y:tpad,w:col1,h:row0,bg:"#E8F0FF",border:C.navy,val:"60",label:"20×3",color:C.navy},
        {x:lpad,y:tpad+row0,w:col0,h:row1,bg:C.amberPale,border:C.amberDeep,val:"40",label:"4×10",color:C.amberDeep},
        {x:lpad+col0,y:tpad+row0,w:col1,h:row1,bg:C.terraPale,border:C.terra,val:"12",label:"4×3",color:C.terra},
      ].map(({x,y,w,h,bg,border,val,label,color},i)=>(
        <g key={i}>

              <text x={x+w/2} y={y+h/2-8} textAnchor="middle" fontSize="11" fill={color} fontWeight="700">{label}</text>
              <text x={x+w/2} y={y+h/2+10} textAnchor="middle" fontSize="18" fill={color} fontWeight="900">{val}</text>

      {/* Total */}
      {revealed&&(
        <text x={lpad+(W)/2} y={tpad+H+22} textAnchor="middle" fontSize="14" fontWeight="900" fill={C.navy}>
          200 + 60 + 40 + 12 = 312
        </text>
      )}
    </svg>
  );
}

// ── SKETCHPAD ─────────────────────────────────────────────────────────────
function Sketchpad(){
  const canvasRef=useRef(null);
  const [drawing,setDrawing]=useState(false);
  const [lastPos,setLastPos]=useState(null);
  const [penTool,setPenTool]=useState("pen");
  const [color,setColor]=useState(C.teal);
  const [size,setSize]=useState(3);
  const getPos=useCallback((e,canvas)=>{
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(cx-rect.left)*scaleX,y:(cy-rect.top)*scaleY};
  },[]);
  const startDraw=useCallback((e)=>{e.preventDefault();if(!canvasRef.current)return;setDrawing(true);setLastPos(getPos(e,canvasRef.current));},[getPos]);
  const doDraw=useCallback((e)=>{
    e.preventDefault();if(!drawing||!canvasRef.current||!lastPos)return;
    const canvas=canvasRef.current,ctx=canvas.getContext("2d"),pos=getPos(e,canvas);
    if(penTool==="eraser"){ctx.clearRect(pos.x-14,pos.y-14,28,28);}
    else{ctx.beginPath();ctx.moveTo(lastPos.x,lastPos.y);ctx.lineTo(pos.x,pos.y);ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();}
    setLastPos(pos);
  },[drawing,lastPos,penTool,color,size,getPos]);
  const endDraw=useCallback((e)=>{e.preventDefault();setDrawing(false);},[]);
  return(
    <div style={{background:"#fff",borderRadius:16,border:`2px solid ${C.amber}88`}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:`1.5px solid ${C.amberPale}`,flexWrap:"wrap",background:C.amberPale,borderRadius:"14px 14px 0 0"}}>
        <span style={{fontSize:15,fontWeight:800,color:C.amberDeep}}>✏️ Sketchpad</span>
        {[{id:"pen",icon:"✏️",label:"Draw"},{id:"eraser",icon:"⬜",label:"Erase"}].map(({id,icon,label})=>(
          <button key={id} onClick={()=>setPenTool(id)} style={{padding:"7px 14px",borderRadius:10,border:`2px solid ${penTool===id?C.teal:"#ccc"}`,background:penTool===id?C.tealPale:"#fff",color:penTool===id?C.teal:C.textMid,fontWeight:700,fontSize:14,cursor:"pointer"}}>{icon} {label}</button>
        ))}
        <div style={{display:"flex",gap:7}}>{[C.teal,C.navy,C.terra,C.amberDeep,"#444"].map(c=>(
          <button key={c} onClick={()=>{setColor(c);setPenTool("pen");}} style={{width:28,height:28,borderRadius:"50%",background:c,border:`3px solid ${color===c?"#fff":"transparent"}`,outline:`2.5px solid ${color===c?c:"transparent"}`,cursor:"pointer"}}/>
        ))}</div>
        <div style={{display:"flex",gap:7}}>{[{s:2,w:18},{s:4,w:24},{s:8,w:30}].map(({s,w})=>(
          <button key={s} onClick={()=>{setSize(s);setPenTool("pen");}} style={{width:w,height:w,borderRadius:"50%",background:size===s?color:"#ccc",border:`2px solid ${size===s?color:"#bbb"}`,cursor:"pointer"}}/>
        ))}</div>
        <button onClick={()=>{const c=canvasRef.current;if(c)c.getContext("2d").clearRect(0,0,c.width,c.height);}} style={{marginLeft:"auto",padding:"7px 16px",borderRadius:10,border:`2px solid ${C.terra}44`,background:"#fff",color:C.terra,fontWeight:700,fontSize:14,cursor:"pointer"}}>🗑 Clear</button>
      </div>
      <canvas ref={canvasRef} width={800} height={280}
        style={{width:"100%",height:280,display:"block",background:"#fdfcf8",cursor:penTool==="eraser"?"cell":"crosshair",touchAction:"none",borderRadius:"0 0 14px 14px"}}
        onMouseDown={startDraw} onMouseMove={doDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={doDraw} onTouchEnd={endDraw}/>
      <div style={{padding:"8px 14px 10px",fontSize:13,color:C.textMid}}>🔒 Your drawing stays here only. Never saved or sent.</div>
    </div>
  );
}

    ...(spanish?["Yo noto que...","Yo pienso que... porque...","El modelo de área muestra..."]:[] ),
  ];

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  useEffect(()=>{
    if(nav==="lesson"&&msgs.length===0){
      setTimeout(()=>setMsgs([{from:"ai",
        text:`Hi ${STUDENT.nickname}! 🌟 Welcome to today's math session.\n\nBefore we look at any numbers, I want to start with something real.\n\nHave you ever been to a fundraiser — or helped raise money at school, at church, or in your neighborhood? What were you raising money for?\n\nTell me about it in English or Spanish — whichever helps you think.`
      }]),500);
    }
  },[nav]);

  // Reveal numbers when we move to read2
  useEffect(()=>{
    if(phase==="read2"||phase==="read3"||phase==="building"||phase==="cfu_wait"||phase==="cfu_explain"||phase==="released"){
      setNumbersRevealed(true);
    }
  },[phase]);

  // Readiness check
  useEffect(()=>{
    if(phase!=="building"||readyShown)return;
    if(msgs.filter(m=>m.from==="student").length<3)return;
    if(isReady(msgs)){
      setReadyShown(true);
      setTimeout(()=>{
        setTyping(true);
        setTimeout(()=>{
          setTyping(false);
          setPhase("cfu_wait");
          setMsgs(prev=>[...prev,{from:"ai",text:`${STUDENT.nickname}, I am noticing something.\n\nYou just explained the key mathematical idea using the area model strategy. That is real progress.\n\n📝 Now try it on your own in your workbook. Use the area model to solve 24 × 13. Fill in all four sections.\n\nCome back and tell me your answer when you have it.`,special:"transition"}]);
        },1400);
      },600);
    }
  },[msgs]);

  function send(override){
    const text=(override||input).trim();
    if(!text||typing)return;
    setInput("");setFrame(null);
    setMsgs(prev=>[...prev,{from:"student",text}]);
    setCount(c=>c+1);setTyping(true);
    setTimeout(()=>{
      const res=getResponse(text,spanish,STUDENT.nickname,phase,count);
      setTyping(false);
      if(res.phase)setPhase(res.phase);
      if(res.signal){setTeacherSignal(true);setTimeout(()=>setShowMetacog(true),2000);}
      setMsgs(prev=>[...prev,{from:"ai",text:res.text,special:res.phase==="released"?"release":null}]);
    },1300);
  }

  function useHint(){
    if(hintsUsed>=PROBLEM.hints.length||phase==="released")return;
    setMsgs(prev=>[...prev,{from:"ai",text:`💡 Hint ${hintsUsed+1} of ${PROBLEM.hints.length}:\n\n${PROBLEM.hints[hintsUsed]}`,special:"hint"}]);
    setHintsUsed(h=>h+1);
  }

  // ── GROWTH PAGE ──────────────────────────────────────────────────────
  const GrowthPage=()=>(
    <div style={{padding:"24px 20px 32px"}}>
      <div style={{fontSize:26,fontWeight:900,color:C.navy,marginBottom:6}}>My Growth 🌱</div>
      <div style={{fontSize:16,color:C.textMid,marginBottom:24}}>Here is what you have been building.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:20}}>
        {[{label:"Lessons Done",value:STUDENT.lessonsCompleted,icon:"📚",color:C.teal},{label:"Day Streak",value:`${STUDENT.streak} 🔥`,icon:"🔥",color:C.amber},{label:"My Level",value:"Expanding",icon:"⭐",color:C.navy}].map(({label,value,icon,color})=>(
          <div key={label} style={{background:"#fff",borderRadius:18,padding:"22px 16px",border:`2px solid ${color}22`,textAlign:"center"}}>
            <div style={{fontSize:30,marginBottom:8}}>{icon}</div>
            <div style={{fontSize:28,fontWeight:900,color}}>{value}</div>
            <div style={{fontSize:14,color:C.textMid,marginTop:4}}>{label}</div>

      <div style={{background:"#fff",borderRadius:18,padding:"22px",border:`2px solid ${C.tealPale}`}}>

        <div style={{display:"flex",gap:10,alignItems:"flex-end",height:110,marginBottom:10}}>
          {STUDENT.sessionHistory.map((s,i)=>{
            const h=s.path===null?16:s.path==="understand"?30:s.path==="start"?60:100;
            const bg=s.path===null?"#e8e8e8":s.path==="understand"?C.terra:s.path==="start"?C.amber:C.teal;
            return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
              <div style={{width:"100%",height:h,borderRadius:8,background:bg}}/>

            </div>);
          })}
        </div>
        <div style={{background:C.tealPale,borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontSize:16,fontWeight:700,color:C.teal}}>🌟 Look at how your bar is getting taller, {STUDENT.nickname}. That is your growth.</div>
        </div>
      </div>

  // ── WORDS PAGE ────────────────────────────────────────────────────────
  const WordsPage=()=>(
    <div style={{padding:"24px 20px 32px"}}>
      <div style={{fontSize:26,fontWeight:900,color:C.navy,marginBottom:6}}>My Words 📖</div>
      <div style={{fontSize:16,color:C.textMid,marginBottom:24}}>Math words and cognates for this unit.</div>
      {PROBLEM.cognates.map(({en,es,note})=>(

  // ── HOME PAGE ─────────────────────────────────────────────────────────
  const HomePage=()=>(
    <div style={{padding:"24px 20px 32px"}}>
      <div style={{fontSize:26,fontWeight:900,color:C.navy,marginBottom:6}}>Hi {STUDENT.nickname}! 👋</div>
      <div style={{fontSize:16,color:C.textMid,marginBottom:24}}>Grade {STUDENT.grade} · Scholar {STUDENT.scholarCode} · {STUDENT.framework}: {STUDENT.proficiencyLevel}</div>

          <div style={{fontSize:38,marginBottom:10}}>📐</div>
          <div style={{fontSize:20,fontWeight:900,color:"#fff"}}>Today's Lesson</div>

  // ── LESSON PAGE ───────────────────────────────────────────────────────
  const LessonPage=()=>{
    if(mode==="partner_explore"||mode==="small_group"){
      return <PartnerModeScreen mode={mode}/>;
    }
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
        <div style={{flex:1,overflowY:"auto",padding:"14px 16px 8px"}}>

          {/* Problem card */}
          <div style={{background:"#fff",borderRadius:18,border:`2px solid ${C.tealPale}`,padding:"18px 20px",marginBottom:12,boxShadow:"0 2px 8px rgba(42,122,111,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:13,fontWeight:800,color:C.teal,letterSpacing:.5,textTransform:"uppercase"}}>{PROBLEM.concept}</span>
              <span style={{fontSize:12,color:C.textLt}}>{PROBLEM.standard}</span>
            </div>

            {/* Three Reads indicator */}
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {[{label:"1st Read",sub:"The story",active:["context","read1_intro","read1"].includes(phase)},
                {label:"2nd Read",sub:"The numbers",active:["read2"].includes(phase)},
                {label:"3rd Read",sub:"The question",active:["read3"].includes(phase)},
                {label:"Solve",sub:"Area model",active:["building","cfu_wait","cfu_explain","released"].includes(phase)}

                <div key={i} style={{flex:1,padding:"6px 8px",borderRadius:10,background:active?C.tealPale:"#f5f5f5",border:`1.5px solid ${active?C.teal:"#e0e0e0"}`,textAlign:"center"}}>

                  <div style={{fontSize:10,color:active?C.tealMid:C.textLt}}>{sub}</div>
                </div>
              ))}
            </div>

            {/* Problem text - numbers hidden on first read */}
            <div style={{background:C.creamMid,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
              {!numbersRevealed?(
                <>
                  <div style={{fontSize:11,fontWeight:800,color:C.teal,marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>First Read — Story Only (numbers hidden)</div>
                  <p style={{fontSize:17,fontWeight:600,color:C.navy,lineHeight:1.75,margin:0}}>{PROBLEM.storyOnly}</p>
                </>
              ):(
                <>
                  <div style={{fontSize:11,fontWeight:800,color:C.teal,marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>{phase==="read2"?"Second Read — What are the numbers?":phase==="read3"?"Third Read — What is the question?":"Full Problem"}</div>
                  <p style={{fontSize:17,fontWeight:600,color:C.navy,lineHeight:1.75,margin:0}}>{PROBLEM.full}</p>
                </>
              )}
            </div>

            {/* Area model */}
            {(showAreaModel||["building","cfu_wait","cfu_explain","released"].includes(phase))&&(
              <div style={{background:C.tealPale,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:800,color:C.teal,textTransform:"uppercase",letterSpacing:.5}}>Area Model: 24 × 13</div>
                  {phase!=="released"&&<button onClick={()=>setAreaRevealed(r=>!r)} style={{fontSize:12,fontWeight:700,color:C.teal,background:"none",border:`1px solid ${C.teal}`,borderRadius:8,padding:"4px 10px",cursor:"pointer"}}>{areaRevealed?"Hide answers":"Reveal answers"}</button>}
                </div>
                <AreaModel revealed={areaRevealed||phase==="released"}/>
                <div style={{fontSize:12,color:C.textMid,marginTop:8,fontStyle:"italic"}}>Fill in each section in your workbook. Each section is one partial product.</div>
              </div>
            )}

            {/* Key vocabulary */}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {PROBLEM.vocabulary.slice(0,3).map(({word})=>(
                <span key={word} style={{fontSize:12,fontWeight:700,background:C.amberPale,border:`1px solid ${C.amber}44`,color:C.amberDeep,padding:"4px 10px",borderRadius:20}}>{word}</span>

            </div>
          </div>

          {/* Tool row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:8,marginBottom:12}}>
            {[
              {id:"sketch",icon:"✏️",label:"Sketchpad",active:showSketch,fn:()=>{setShowSketch(s=>!s);setShowFrames(false);setShowVocab(false);setShowAreaModel(false);}},
              {id:"frames",icon:"💬",label:"Math Talk",active:showFrames,fn:()=>{setShowFrames(s=>!s);setShowSketch(false);setShowVocab(false);setShowAreaModel(false);}},
              {id:"vocab", icon:"📖",label:"Words",    active:showVocab, fn:()=>{setShowVocab(s=>!s); setShowSketch(false);setShowFrames(false);setShowAreaModel(false);}},

              <button key={id} onClick={fn} style={{padding:"12px 6px",borderRadius:14,border:`2px solid ${active?C.teal:"#e8e8e8"}`,background:active?C.tealPale:"#fff",color:active?C.teal:C.textMid,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:22}}>{icon}</span>
                <span style={{lineHeight:1.2,textAlign:"center"}}>{label}</span>
              </button>
            ))}
            <button onClick={useHint} disabled={hintsUsed>=PROBLEM.hints.length||phase==="released"}
              style={{padding:"12px 6px",borderRadius:14,border:`2px solid ${hintsUsed<PROBLEM.hints.length?C.amber+"88":"#e8e8e8"}`,background:hintsUsed<PROBLEM.hints.length?C.amberPale:"#f5f5f5",color:hintsUsed<PROBLEM.hints.length?C.amberDeep:C.textLt,fontWeight:700,fontSize:12,cursor:hintsUsed<PROBLEM.hints.length&&phase!=="released"?"pointer":"not-allowed",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:22}}>💡</span>
              <span>Hint {hintsUsed}/{PROBLEM.hints.length}</span>

          {showSketch&&<div style={{marginBottom:12}}><Sketchpad/></div>}

                {FRAMES.map(f=>(
                  <button key={f} onClick={()=>{setFrame(f);setInput(f);inputRef.current?.focus();}} style={{padding:"10px 18px",borderRadius:22,border:`2px solid ${frame===f?C.teal:"#e0e0e0"}`,background:frame===f?C.tealPale:"#fff",color:frame===f?C.teal:C.textMid,fontWeight:frame===f?800:500,fontSize:15,cursor:"pointer"}}>{f}</button>

            </div>

            <div style={{background:"#fff",borderRadius:16,border:`2px solid ${C.amber}66`,padding:"16px 18px",marginBottom:12}}>
              <div style={{fontSize:16,fontWeight:800,color:C.amberDeep,marginBottom:10}}>📖 Key words + cognates</div>
              {PROBLEM.cognates.map(({en,es,note})=>(
                <div key={en} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${C.tealPale}`}}>
                  <span style={{background:C.tealPale,borderRadius:8,padding:"4px 10px",fontSize:14,fontWeight:800,color:C.teal,flexShrink:0}}>{en}</span>
                  <span style={{background:C.amberPale,borderRadius:8,padding:"4px 10px",fontSize:14,fontWeight:800,color:C.amberDeep,flexShrink:0}}>{es}</span>
                  <span style={{fontSize:13,color:C.textMid,fontStyle:"italic",lineHeight:1.5}}>{note}</span>
                </div>
              ))}
            </div>
          )}

          {/* Chat messages */}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {msgs.length===0&&<div style={{textAlign:"center",padding:"32px 20px",color:C.textLt,fontSize:16}}>Brilla is ready. Your message starts the conversation.</div>}
            {msgs.map((msg,i)=>(
              <div key={i} style={{display:"flex",justifyContent:msg.from==="ai"?"flex-start":"flex-end"}}>
                <div style={{maxWidth:"82%"}}>
                  <div style={{fontSize:13,fontWeight:800,marginBottom:5,letterSpacing:.5,color:msg.from==="ai"?C.teal:C.amberDeep}}>
                    {msg.from==="ai"?"BRILLA":STUDENT.nickname.toUpperCase()}
                  </div>
                  <div style={{padding:"16px 20px",borderRadius:msg.from==="ai"?"6px 20px 20px 20px":"20px 6px 20px 20px",
                    background:msg.special==="release"?C.tealPale:msg.special==="transition"?C.amberPale:msg.special==="hint"?"#fffbef":msg.from==="ai"?"#fff":C.teal,
                    border:msg.special==="release"?`2px solid ${C.teal}`:msg.special==="transition"?`2px solid ${C.amber}`:msg.special==="hint"?`2px solid ${C.amber}66`:msg.from==="ai"?`1.5px solid ${C.tealPale}`:"none",
                    color:msg.from==="ai"?C.text:"#fff",fontSize:17,lineHeight:1.75,whiteSpace:"pre-line",
                    boxShadow:msg.from==="ai"?"0 2px 8px rgba(42,122,111,.08)":"none"}}>
                    {msg.special==="release"&&<div style={{fontSize:22,marginBottom:8}}>✨</div>}
                    {msg.special==="transition"&&<div style={{fontSize:22,marginBottom:8}}>📝</div>}
                    {msg.text}

                </div>
              </div>

            {typing&&(
              <div style={{display:"flex"}}>
                <div style={{padding:"16px 20px",borderRadius:"6px 20px 20px 20px",background:"#fff",border:`1.5px solid ${C.tealPale}`,display:"flex",gap:7}}>
                  {[0,1,2].map(i=><div key={i} style={{width:9,height:9,borderRadius:"50%",background:C.teal,animation:"bounce 1.2s infinite",animationDelay:`${i*0.2}s`}}/>)}
                </div>
              </div>
            )}
            <div ref={endRef} style={{paddingBottom:8}}/>
          </div>
        </div>

        {/* Metacognitive prompt */}
        {showMetacog&&!metacogDone&&(
          <div style={{margin:"0 16px 10px",background:C.amberPale,borderRadius:16,padding:"16px 18px",border:`2px solid ${C.amber}44`}}>
            <div style={{fontSize:15,fontWeight:800,color:C.amberDeep,marginBottom:10}}>🧠 Before you go — one quick reflection</div>

              <input style={{flex:1,padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.tealPale}`,fontSize:15,fontFamily:"inherit",outline:"none"}}

              <button onClick={()=>setMetacogDone(true)} style={{padding:"10px 18px",borderRadius:10,background:C.amber,color:"#fff",border:"none",fontWeight:800,fontSize:14,cursor:"pointer"}}>Done ✓</button>

        {/* Input */}
        <div style={{padding:"10px 16px 14px",borderTop:`1.5px solid ${C.tealPale}`,background:C.cream,flexShrink:0}}>
          {phase==="released"?(
            <div style={{background:C.tealPale,borderRadius:16,padding:"18px 20px",textAlign:"center",border:`2px solid ${C.teal}`}}>
              <div style={{fontSize:18,fontWeight:800,color:C.teal,marginBottom:6}}>✓ You are ready for independent work!</div>

            </div>
          ):(
            <>
              <div style={{background:"#fff",borderRadius:16,border:`2px solid ${C.tealPale}`,display:"flex",alignItems:"center",gap:8,padding:"10px 10px 10px 18px",boxShadow:"0 2px 8px rgba(42,122,111,.07)"}}>
                <input ref={inputRef}
                  style={{flex:1,border:"none",outline:"none",fontSize:17,color:C.text,background:"transparent",fontFamily:"inherit"}}

                  value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
                <button onClick={()=>send()} disabled={!input.trim()||typing}
                  style={{padding:"13px 26px",borderRadius:14,background:!input.trim()||typing?"#e8e8e8":C.teal,color:!input.trim()||typing?C.textLt:"#fff",border:"none",fontWeight:800,fontSize:16,cursor:!input.trim()||typing?"not-allowed":"pointer"}}>
                  Send →
                </button>
              </div>
              <DemoHint text={
                phase==="context"?"Try typing: 'Yes, my school sold candy bars for a field trip' or 'No, but my church does it' or 'No sé qué es un fundraiser'":
                phase==="read1"||phase==="read1_intro"?"Try typing: 'A school is having a fundraiser selling candles'":
                phase==="read2"?"Try typing: '24 is the number of boxes they sold and 13 is how much each box costs'":
                phase==="read3"?"Try typing: 'I need to find how much money they raised in total'":
                phase==="cfu_wait"?"Solve in your workbook first. Try typing: '312' when you have your answer.":
                "Try typing: 'I used the area model. I decomposed 24 into 20 and 4 and 13 into 10 and 3'"
              }/>
            </>
          )}
        </div>
      </div>
    );
  };

  // ── ROOT ─────────────────────────────────────────────────────────────
  return(
    <div style={{fontFamily:"'Nunito',sans-serif",background:C.cream,minHeight:"100vh",display:"flex",flexDirection:"column"}}>

      {/* DEMO BANNER */}
      <div style={{background:C.amberPale,borderTop:`3px solid ${C.amber}`,padding:"8px 20px",textAlign:"center",fontSize:13,color:C.amberDeep,fontWeight:700,flexShrink:0}}>
        🎯 Interactive Demo — AI responses are illustrative examples, not live AI. Follow the italicized prompts to explore.
      </div>

      {/* TOP BAR */}
      <div style={{background:"#fff",borderBottom:`2px solid ${C.tealPale}`,padding:"12px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(42,122,111,.06)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:46,height:46,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.tealMid})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:20}}>{STUDENT.nickname[0]}</div>
          <div>
            <div style={{fontSize:18,fontWeight:900,color:C.navy}}>{STUDENT.nickname}</div>
            <div style={{fontSize:13,color:C.textLt}}>Scholar {STUDENT.scholarCode} · Grade {STUDENT.grade} · {STUDENT.proficiencyLevel}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {/* Mode indicator */}
          <div style={{padding:"7px 14px",borderRadius:22,fontSize:12,fontWeight:800,background:mode==="independent"?C.tealPale:mode==="partner_explore"?C.amberPale:"#eef7ee",color:mode==="independent"?C.teal:mode==="partner_explore"?C.amberDeep:"#2d7a2d",border:`1.5px solid ${mode==="independent"?C.teal:mode==="partner_explore"?C.amber:"#2d7a2d"}44`,cursor:"pointer"}}
            onClick={()=>setMode(m=>m==="independent"?"partner_explore":m==="partner_explore"?"small_group":"independent")}
            title="Demo: click to toggle mode">
            {mode==="independent"?"📱 Independent":mode==="partner_explore"?"🤝 Partner Explore":"👩‍🏫 Small Group"}
          </div>
          <button onClick={()=>{setSpanish(s=>!s);if(!spanish)setMsgs(prev=>[...prev,{from:"ai",text:`Cambiando a apoyo bilingüe, ${STUDENT.nickname}. 🌐\nPuedes escribir en español o en inglés.`}]);}}
            style={{padding:"10px 20px",borderRadius:24,border:`2px solid ${spanish?C.amber:"#ddd"}`,background:spanish?C.amberPale:"#fff",color:spanish?C.amberDeep:C.textMid,fontWeight:800,fontSize:15,cursor:"pointer"}}>
            🌐 Español
          </button>
          {teacherSignal&&<div style={{padding:"9px 16px",borderRadius:24,background:C.tealPale,border:`2px solid ${C.teal}`,fontSize:14,fontWeight:700,color:C.teal}}>✓ Ms. Reyes knows you are ready</div>}
          <div style={{padding:"9px 14px",borderRadius:24,background:"#f5f5f5",fontSize:13,color:C.textLt}}>🔒 Session only</div>
        </div>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:"flex",minHeight:0}}>
        {/* LEFT NAV */}
        <div style={{width:230,background:"#fff",borderRight:`2px solid ${C.tealPale}`,padding:"18px 12px 24px",display:"flex",flexDirection:"column",gap:4,flexShrink:0,overflowY:"auto"}}>
          <div style={{fontSize:11,fontWeight:900,color:C.textLt,letterSpacing:1,textTransform:"uppercase",padding:"0 8px",marginBottom:8}}>My Dashboard</div>
          <NavItem icon="🏠" label="Home"           active={nav==="home"}   onClick={()=>setNav("home")}/>
          <NavItem icon="📐" label="Today's Lesson" active={nav==="lesson"} onClick={()=>setNav("lesson")} badge={phase!=="released"?"!":null}/>
          <NavItem icon="🌱" label="My Growth"      active={nav==="growth"} onClick={()=>setNav("growth")}/>
          <NavItem icon="📖" label="My Words"       active={nav==="words"}  onClick={()=>setNav("words")}/>
          <div style={{flex:1}}/>
          {/* Mood */}
          <div style={{borderTop:`1px solid ${C.tealPale}`,paddingTop:14}}>
            <div style={{fontSize:12,fontWeight:800,color:C.textLt,letterSpacing:.5,textTransform:"uppercase",marginBottom:10,padding:"0 6px"}}>How am I feeling?</div>
            {[{v:"great",e:"😊",l:"Great"},{v:"okay",e:"😐",l:"Okay"},{v:"stuck",e:"😕",l:"Stuck"}].map(({v,e,l})=>(
              <button key={v} onClick={()=>setMood(v)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 12px",borderRadius:12,width:"100%",border:`2px solid ${mood===v?C.teal:"transparent"}`,background:mood===v?C.tealPale:"transparent",color:mood===v?C.teal:C.textMid,fontWeight:mood===v?800:500,fontSize:16,cursor:"pointer",marginBottom:3,textAlign:"left"}}>
                <span style={{fontSize:22}}>{e}</span> {l}
              </button>
            ))}
            {mood&&<div style={{fontSize:13,color:C.textMid,padding:"4px 8px",fontStyle:"italic"}}>{mood==="great"?"Keep that energy. ✨":mood==="okay"?"You are making progress.":"Being stuck is part of math."}</div>}
          </div>
          {/* Support paths */}
          {nav==="lesson"&&mode==="independent"&&(
            <div style={{borderTop:`1px solid ${C.tealPale}`,paddingTop:14}}>
              <div style={{fontSize:12,fontWeight:800,color:C.textLt,letterSpacing:.5,textTransform:"uppercase",marginBottom:10,padding:"0 6px"}}>Where Am I?</div>
              {[
                {emoji:"😕",label:"I don't understand",msg:"I don't understand what this problem is asking me to do",color:C.terra,bg:C.terraPale},
                {emoji:"🤔",label:"I get it but don't know where to start",msg:"I kind of get it but I don't know where to start",color:C.amber,bg:C.amberPale},
                {emoji:"💡",label:"I started but got stuck",msg:"I started but I got stuck",color:C.teal,bg:C.tealPale},
              ].map(({emoji,label,msg,color,bg})=>(
                <button key={label} onClick={()=>send(msg)} disabled={phase==="released"}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"13px 12px",borderRadius:14,width:"100%",border:`2px solid ${color}33`,background:bg,color:C.navy,fontWeight:700,fontSize:14,cursor:phase==="released"?"not-allowed":"pointer",marginBottom:8,textAlign:"left",opacity:phase==="released"?.5:1}}>
                  <span style={{fontSize:24,flexShrink:0}}>{emoji}</span>
                  <span style={{lineHeight:1.3}}>{label}</span>
                </button>
              ))}
            </div>
          )}
          {nav==="lesson"&&mode==="partner_explore"&&(
            <div style={{borderTop:`1px solid ${C.tealPale}`,paddingTop:14}}>
              <button onClick={()=>send("We need a hint")} style={{width:"100%",padding:"13px 12px",borderRadius:14,border:`2px solid ${C.amber}44`,background:C.amberPale,color:C.amberDeep,fontWeight:700,fontSize:14,cursor:"pointer",textAlign:"center"}}>
                🤝 We need a hint
              </button>
              <div style={{fontSize:12,color:C.textLt,marginTop:6,fontStyle:"italic",textAlign:"center"}}>Only after talking with your partner first</div>
            </div>
          )}
        </div>

        {/* MAIN */}
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,overflowY:nav==="lesson"?"hidden":"auto"}}>
          {nav==="home"  &&<HomePage/>}
          {nav==="lesson"&&<LessonPage/>}
          {nav==="growth"&&<GrowthPage/>}
          {nav==="words" &&<WordsPage/>}
        </div>
      </div>

      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(BrillaStudentDashboard));
</script>
</body>
</html>
