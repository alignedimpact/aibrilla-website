<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light"/>
  <title>Brilla · Student Agency Portal Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #FEFAF4 !important; color-scheme: light; font-family: 'Nunito', sans-serif; }
    #root { height: 100%; }
    button { font-family: 'Nunito', sans-serif; }
    input, textarea, select { font-family: 'Nunito', sans-serif; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;


const C = {
  teal: "#2A7A6F", tealMid: "#3D9188", tealPale: "#E8F4F2", tealDeep: "#1a5c53",
  amber: "#E9A84C", amberPale: "#FDF3DC", amberDeep: "#C4832A",
  terra: "#C4604A", terraPale: "#FAEAE6",
  navy: "#1B3A6B", cream: "#FEFAF4", creamMid: "#FAF3E7",
  text: "#2C3E38", textMid: "#5A7268", textLt: "#8FA89F",
};

const STUDENT = {
  scholarCode: "A1", nickname: "Spidergirl", firstName: "Sofia",
  grade: 3, proficiencyLevel: "Expanding", framework: "CA ELD",
  needsVisual: true, module: 4, lesson: 18, streak: 5, lessonsCompleted: 6,
  sessionHistory: [
    { lesson: 13, mood: "okay",  path: "understand" },
    { lesson: 14, mood: "stuck", path: "start"      },
    { lesson: 15, mood: "great", path: "stuck"      },
    { lesson: 16, mood: "great", path: "stuck"      },
    { lesson: 17, mood: "okay",  path: "start"      },
    { lesson: 18, mood: null,    path: null          },
  ],
};

const PROBLEMS = [
  {
    id: 1,
    text: "Ms. Reyes has 24 students. She wants to put them into equal groups. She can make groups of 3, 4, or 6. How many groups would she have for each option? Which grouping gives the most groups?",
    concept: "Equal Groups · Division",
    spanishKey: "grupos iguales = equal groups · dividir = divide · cuántos grupos = how many groups",
    hints: [
      "What does equal groups mean? Can you draw what it looks like?",
      "If you made groups of 3 from 24 students — how many groups would that be? Try drawing circles.",
      "Think: 24 ÷ 3 = ? How many 3s fit inside 24?",
    ],
    readyWords: ["divide","groups","equal","grupos","dividir","÷"],
  },
  {
    id: 2,
    text: "Ms. Reyes has 36 crackers to share equally into bags. If she fills 4 bags, 6 bags, or 9 bags — how many crackers go in each bag? Show your thinking.",
    concept: "Equal Sharing · Division",
    spanishKey: "la misma cantidad = same amount · cada bolsa = each bag · compartir = share equally",
    hints: [
      "What are you splitting up? What do you know for sure?",
      "If you share 36 crackers equally into 4 bags, try drawing 4 bags and placing the crackers.",
      "Think: 36 ÷ 4 = ? How many crackers land in each bag?",
    ],
    readyWords: ["each","share","bag","equally","dividir","cada","÷"],
  },
];

function scrub(t) {
  return t.replace(/\b\d{3}[-.]?\d{3}[-.]?\d{4}\b/g,"[redacted]")
          .replace(/\b[A-Z][a-z]{2,} [A-Z][a-z]{2,}\b/g,"[name]");
}

function isReady(msgs, problem) {
  const mine = msgs.filter(m => m.from === "student").slice(-4);
  if (mine.length < 2) return false;
  const combined = mine.map(m => m.text.toLowerCase()).join(" ");
  const hits = problem.readyWords.filter(w => combined.includes(w.toLowerCase()));
  return combined.length > 50 && hits.length >= 2;
}

function getResponse(raw, problem, spanish, name, phase, count) {
  const t = scrub(raw).toLowerCase();

  if (phase === "cfu_wait") {
    if (/\d/.test(t)) return { text:`${name}, walk me through how you got there. What did you do first? I want to understand your thinking, not just the number.`, phase:"cfu_explain" };
    return { text:`Take your time, ${name}. Solve it in your workbook first. Come back when you have an answer.`, phase:"cfu_wait" };
  }
  if (phase === "cfu_explain") {
    if (/(divide|group|÷|split|share|igual|dividir|grupos)/.test(t))
      return { text:`${name}, that is clear mathematical reasoning. You showed me your thinking, not just your answer. That is exactly what strong mathematicians do.\n\n✨ You are ready to work through the rest in your workbook. Write your strategy down before you go.`, phase:"released", signal:true };
    return { text:`${name}, tell me about one part of how you solved it. What operation did you use and why?`, phase:"cfu_explain" };
  }

  if (/answer|just tell|give me|dime la/.test(t))
    return { text: spanish
      ? `${name}, la respuesta ya está en tu pensamiento.\n\n¿Qué sabes ya sobre este problema? / What do you already know?`
      : `${name}, the answer is not mine to give. It already lives in your thinking. What do you know for certain right now?`,
      phase:"building" };

  if (/no entiendo|no sé|ayuda|como/.test(t))
    return { text:`${name}, that is mathematical thinking in any language.\n\n${problem.spanishKey}\n\nEn clase podrías decir: "I know I need to make equal groups because..."\n\nNow tell me: what do you already know about this problem?`, phase:"building" };

  if (/equal|igual|same|group|grupo/.test(t))
    return { text:`Yes, ${name}. Equal groups is exactly the right concept.\n\nNow here is the key question: if you know the total number AND the size of each group, what are you trying to find?`, phase:"building" };

  if (/divide|division|÷|dividir|split/.test(t))
    return { text:`${name}, division is the right operation. In your own words — what does it mean to divide? What are you actually doing to the numbers?`, phase:"building" };

  if (/\b(8|6|4|9|3|12|24|36)\b/.test(t))
    return { text:`${name}, you are working with numbers. Before I respond to that — tell me how you got there. The process matters more than the number right now.`, phase:"building" };

  if (/stuck|confused|don't know|no sé|help/.test(t))
    return { text:`Being stuck is part of the process, ${name}. Let's go smaller. What is the problem asking you to find? Just that one thing — nothing else yet.`, phase:"building" };

  const fallbacks = [
    `${name}, you are thinking. Keep going. What does that tell you about what to do next?`,
    `Interesting, ${name}. Can you say more about that? What made you think of that approach?`,
    `${name}, connect that to the problem. How does what you just said help you find the answer?`,
    `Good thinking, ${name}. What would happen if you tried that with the actual numbers?`,
    `${name}, I hear you. What is the very next step you could take, even a small one?`,
  ];
  return { text:fallbacks[count % fallbacks.length], phase:"building" };
}

// ── VISUALS ───────────────────────────────────────────────────────────────
function GroupsVisual() {
  return (
    <svg viewBox="0 0 280 90" style={{ width:"100%", display:"block" }}>
      {[0,1,2].map(g => (
        <g key={g} transform={`translate(${g*96+4},4)`}>
          <rect x="0" y="0" width="84" height="72" rx="12" fill={C.tealPale} stroke={C.teal} strokeWidth="1.5"/>
          {[0,1,2,3,4,5,6,7].map(d => (
            <circle key={d} cx={13+(d%4)*19} cy={13+Math.floor(d/4)*24} r="8" fill={C.teal} opacity="0.7"/>
          ))}
          <text x="42" y="88" textAnchor="middle" fontSize="11" fill={C.textMid} fontWeight="800">8 in each</text>
        </g>
      ))}
    </svg>
  );
}

// ── SKETCHPAD ─────────────────────────────────────────────────────────────
function Sketchpad() {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [lastPos, setLastPos] = useState(null);
  const [penTool, setPenTool] = useState("pen");
  const [color, setColor] = useState(C.teal);
  const [size, setSize] = useState(3);

  const getPos = useCallback((e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x:(cx-rect.left)*scaleX, y:(cy-rect.top)*scaleY };
  },[]);

  const startDraw = useCallback((e) => {
    e.preventDefault();
    if (!canvasRef.current) return;
    setDrawing(true);
    setLastPos(getPos(e, canvasRef.current));
  },[getPos]);

  const doDraw = useCallback((e) => {
    e.preventDefault();
    if (!drawing || !canvasRef.current || !lastPos) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    if (penTool === "eraser") {
      ctx.clearRect(pos.x-14, pos.y-14, 28, 28);
    } else {
      ctx.beginPath();
      ctx.moveTo(lastPos.x, lastPos.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = color;
      ctx.lineWidth = size;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.stroke();
    }
    setLastPos(pos);
  },[drawing, lastPos, penTool, color, size, getPos]);

  const endDraw = useCallback((e) => {
    e.preventDefault();
    setDrawing(false);
  },[]);

  return (
    <div style={{ background:"#fff", borderRadius:16, border:`2px solid ${C.amber}88`, overflow:"visible" }}>
      {/* Toolbar */}
      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px", borderBottom:`1.5px solid ${C.amberPale}`, flexWrap:"wrap", borderRadius:"14px 14px 0 0", background:C.amberPale }}>
        <span style={{ fontSize:15, fontWeight:800, color:C.amberDeep }}>✏️ Sketchpad</span>

        {[{ id:"pen", icon:"✏️", label:"Draw" },{ id:"eraser", icon:"⬜", label:"Erase" }].map(({ id, icon, label }) => (
          <button key={id} onClick={() => setPenTool(id)}
            style={{ padding:"7px 14px", borderRadius:10, border:`2px solid ${penTool===id ? C.teal:"#ccc"}`, background: penTool===id ? C.tealPale:"#fff", color: penTool===id ? C.teal:C.textMid, fontWeight:700, fontSize:14, cursor:"pointer" }}>
            {icon} {label}
          </button>
        ))}

        <div style={{ display:"flex", gap:7, alignItems:"center" }}>
          {[C.teal, C.navy, C.terra, C.amberDeep, "#444"].map(c => (
            <button key={c} onClick={() => { setColor(c); setPenTool("pen"); }}
              style={{ width:28, height:28, borderRadius:"50%", background:c, border:`3px solid ${color===c?"#fff":"transparent"}`, outline:`2.5px solid ${color===c?c:"transparent"}`, cursor:"pointer" }}/>
          ))}
        </div>

        <div style={{ display:"flex", gap:7, alignItems:"center" }}>
          {[{ s:2, w:18 },{ s:4, w:24 },{ s:8, w:30 }].map(({ s, w }) => (
            <button key={s} onClick={() => { setSize(s); setPenTool("pen"); }}
              style={{ width:w, height:w, borderRadius:"50%", background: size===s ? color:"#ccc", border:`2px solid ${size===s?color:"#bbb"}`, cursor:"pointer" }}/>
          ))}
        </div>

        <button onClick={() => {
          const c = canvasRef.current;
          if (c) c.getContext("2d").clearRect(0,0,c.width,c.height);
        }}
          style={{ marginLeft:"auto", padding:"7px 16px", borderRadius:10, border:`2px solid ${C.terra}44`, background:"#fff", color:C.terra, fontWeight:700, fontSize:14, cursor:"pointer" }}>
          🗑 Clear
        </button>
      </div>

      {/* Canvas */}
      <canvas
        ref={canvasRef}
        width={800} height={300}
        style={{ width:"100%", height:300, display:"block", background:"#fdfcf8", cursor: penTool==="eraser"?"cell":"crosshair", touchAction:"none", borderRadius:"0 0 14px 14px" }}
        onMouseDown={startDraw} onMouseMove={doDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={doDraw} onTouchEnd={endDraw}
      />
      <div style={{ padding:"8px 14px 10px", borderTop:`1px solid ${C.tealPale}`, fontSize:13, color:C.textMid, borderRadius:"0 0 14px 14px" }}>
        🔒 Your drawing stays here only. It is never saved or sent to anyone.
      </div>
    </div>
  );
}

// ── NAV ITEM ──────────────────────────────────────────────────────────────
function NavItem({ icon, label, active, onClick, badge }) {
  return (
    <button onClick={onClick} style={{
      display:"flex", alignItems:"center", gap:12,
      padding:"14px 14px", borderRadius:14, width:"100%",
      border:"none", cursor:"pointer", textAlign:"left",
      background: active ? C.tealPale : "transparent",
      color: active ? C.teal : C.textMid,
      position:"relative",
    }}>
      <span style={{ fontSize:22 }}>{icon}</span>
      <span style={{ fontSize:16, fontWeight: active?800:600 }}>{label}</span>
      {badge && <span style={{ marginLeft:"auto", background:C.amber, color:"#fff", fontSize:12, fontWeight:900, padding:"3px 9px", borderRadius:20 }}>{badge}</span>}
      {active && <div style={{ position:"absolute", left:0, top:"20%", bottom:"20%", width:4, borderRadius:"0 4px 4px 0", background:C.teal }}/>}
    </button>
  );
}

// ── MAIN ──────────────────────────────────────────────────────────────────
function BrillaStudentDashboard() {
  const [nav, setNav]           = useState("lesson");
  const [phase, setPhase]       = useState("building");
  const [probIdx, setProbIdx]   = useState(0);
  const [msgs, setMsgs]         = useState([]);
  const [input, setInput]       = useState("");
  const [typing, setTyping]     = useState(false);
  const [spanish, setSpanish]   = useState(false);
  const [showSketch, setShowSketch] = useState(false);
  const [showFrames, setShowFrames] = useState(false);
  const [showVocab, setShowVocab]   = useState(false);
  const [hintsUsed, setHintsUsed]   = useState(0);
  const [frame, setFrame]       = useState(null);
  const [mood, setMood]         = useState(null);
  const [readyShown, setReadyShown] = useState(false);
  const [teacherSignal, setTeacherSignal] = useState(false);
  const [count, setCount]       = useState(0);

  const endRef   = useRef(null);
  const inputRef = useRef(null);
  const problem  = PROBLEMS[probIdx];

  const FRAMES = [
    "I noticed... so I tried...",
    "I know that... because...",
    "This is like... because...",
    "I am stuck on the part where...",
    "My answer is... because...",
    ...(spanish ? ["Yo noté que... entonces...","Sé que... porque..."] : []),
  ];

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs, typing]);

  useEffect(() => {
    if (nav === "lesson" && msgs.length === 0) {
      setTimeout(() => setMsgs([{ from:"ai", text:
        STUDENT.needsVisual
          ? `Hi ${STUDENT.nickname}! 🌟\n\nI put up a picture to help you see the problem before you read it. Take a look at the groups.\n\nWhen you are ready — what do you notice?`
          : `Hi ${STUDENT.nickname}! 🌟 Here is your math challenge.\n\n${problem.text}\n\nWhat is one thing you notice?`
      }]), 500);
    }
  }, [nav]);

  useEffect(() => {
    if (phase !== "building" || readyShown) return;
    if (msgs.filter(m => m.from === "student").length < 3) return;
    if (isReady(msgs, problem)) {
      setReadyShown(true);
      setTimeout(() => {
        setTyping(true);
        setTimeout(() => {
          setTyping(false);
          setPhase("cfu_wait");
          setMsgs(prev => [...prev, { from:"ai", text:`${STUDENT.nickname}, I am noticing something.\n\nYou just explained the key idea in this problem in your own words. That is real progress.\n\n📝 Now I want you to try the next problem on your own in your workbook. Do not ask me anything — just try it.\n\nCome back and tell me your answer when you have it.`, special:"transition" }]);
        }, 1400);
      }, 600);
    }
  }, [msgs]);

  function send(override) {
    const text = (override || input).trim();
    if (!text || typing) return;
    setInput(""); setFrame(null);
    setMsgs(prev => [...prev, { from:"student", text }]);
    setCount(c => c+1); setTyping(true);
    setTimeout(() => {
      const res = getResponse(text, problem, spanish, STUDENT.nickname,
        phase === "building" ? "building" : phase, count);
      setTyping(false);
      if (res.phase) setPhase(res.phase);
      if (res.signal) setTeacherSignal(true);
      setMsgs(prev => [...prev, { from:"ai", text:res.text, special: res.phase==="released"?"release":null }]);
    }, 1300);
  }

  function useHint() {
    if (hintsUsed >= problem.hints.length || phase === "released") return;
    setMsgs(prev => [...prev, { from:"ai", text:`💡 Hint ${hintsUsed+1} of ${problem.hints.length}:\n\n${problem.hints[hintsUsed]}`, special:"hint" }]);
    setHintsUsed(h => h+1);
  }

  // ── SHARED STYLES ─────────────────────────────────────────────────────────
  const card = { background:"#fff", borderRadius:18, border:`2px solid ${C.tealPale}`, padding:"20px 22px", marginBottom:16 };

  // ── HOME ──────────────────────────────────────────────────────────────────
  const HomePage = () => (
    <div style={{ padding:"24px 20px 32px" }}>
      <div style={{ fontSize:26, fontWeight:900, color:C.navy, marginBottom:6 }}>Hi {STUDENT.nickname}! 👋</div>
      <div style={{ fontSize:16, color:C.textMid, marginBottom:24 }}>Grade {STUDENT.grade} · Scholar {STUDENT.scholarCode} · {STUDENT.framework}: {STUDENT.proficiencyLevel}</div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
        <button onClick={() => setNav("lesson")} style={{ background:C.teal, borderRadius:20, padding:"26px 22px", border:"none", cursor:"pointer", textAlign:"left", boxShadow:`0 4px 20px rgba(42,122,111,.3)` }}>
          <div style={{ fontSize:38, marginBottom:10 }}>📐</div>
          <div style={{ fontSize:20, fontWeight:900, color:"#fff" }}>Today's Lesson</div>
          <div style={{ fontSize:15, color:"rgba(255,255,255,.8)", marginTop:5 }}>Module {STUDENT.module}, Lesson {STUDENT.lesson}</div>
          <div style={{ marginTop:16, background:"rgba(255,255,255,.2)", borderRadius:10, padding:"9px 14px", display:"inline-block" }}>
            <span style={{ fontSize:15, fontWeight:800, color:"#fff" }}>Start Now →</span>
          </div>
        </button>
        <button onClick={() => setNav("growth")} style={{ background:C.amberPale, borderRadius:20, padding:"26px 22px", border:`2px solid ${C.amber}44`, cursor:"pointer", textAlign:"left" }}>
          <div style={{ fontSize:38, marginBottom:10 }}>🌱</div>
          <div style={{ fontSize:20, fontWeight:900, color:C.navy }}>My Growth</div>
          <div style={{ fontSize:15, color:C.textMid, marginTop:5 }}>{STUDENT.lessonsCompleted} lessons · {STUDENT.streak} day streak 🔥</div>
          <div style={{ marginTop:16, background:C.amber, borderRadius:10, padding:"9px 14px", display:"inline-block" }}>
            <span style={{ fontSize:15, fontWeight:800, color:"#fff" }}>See Progress →</span>
          </div>
        </button>
      </div>

      <div style={card}>
        <div style={{ fontSize:17, fontWeight:800, color:C.navy, marginBottom:14 }}>Recent Sessions</div>
        {STUDENT.sessionHistory.slice(3).map((s,i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 0", borderBottom: i<2?`1px solid ${C.tealPale}`:"none" }}>
            <div style={{ fontSize:16, fontWeight:700, color:C.navy }}>Lesson {s.lesson}</div>
            <div style={{ padding:"6px 16px", borderRadius:20, fontSize:14, fontWeight:700,
              background: s.path===null?"#e8e8e8":s.path==="understand"?C.terraPale:s.path==="start"?C.amberPale:C.tealPale,
              color: s.path===null?C.textLt:s.path==="understand"?C.terra:s.path==="start"?C.amberDeep:C.teal }}>
              {s.path===null?"Today":s.path==="understand"?"I started":s.path==="start"?"Found a start":"Got unstuck ✓"}
            </div>
            <div style={{ fontSize:22 }}>{s.mood==="great"?"😊":s.mood==="okay"?"😐":s.mood==="stuck"?"😕":"📌"}</div>
          </div>
        ))}
      </div>

      <div style={{ background:C.tealPale, borderRadius:16, padding:"16px 20px", border:`2px solid rgba(42,122,111,.15)` }}>
        <div style={{ fontSize:16, fontWeight:800, color:C.teal, marginBottom:4 }}>🔒 Your workspace is private</div>
        <div style={{ fontSize:15, color:C.textMid }}>Nothing you type in Brilla is saved after your session ends. This is your safe thinking space.</div>
      </div>
    </div>
  );

  // ── GROWTH ────────────────────────────────────────────────────────────────
  const GrowthPage = () => (
    <div style={{ padding:"24px 20px 32px" }}>
      <div style={{ fontSize:26, fontWeight:900, color:C.navy, marginBottom:6 }}>My Growth 🌱</div>
      <div style={{ fontSize:16, color:C.textMid, marginBottom:24 }}>Here is what you have been building.</div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14, marginBottom:20 }}>
        {[
          { label:"Lessons Done", value:STUDENT.lessonsCompleted, icon:"📚", color:C.teal },
          { label:"Day Streak",   value:`${STUDENT.streak} 🔥`,   icon:"🔥", color:C.amber },
          { label:"My Level",     value:"Expanding",               icon:"⭐", color:C.navy },
        ].map(({ label, value, icon, color }) => (
          <div key={label} style={{ background:"#fff", borderRadius:18, padding:"22px 16px", border:`2px solid ${color}22`, textAlign:"center" }}>
            <div style={{ fontSize:30, marginBottom:8 }}>{icon}</div>
            <div style={{ fontSize:28, fontWeight:900, color }}>{value}</div>
            <div style={{ fontSize:14, color:C.textMid, marginTop:4 }}>{label}</div>
          </div>
        ))}
      </div>

      <div style={card}>
        <div style={{ fontSize:18, fontWeight:800, color:C.navy, marginBottom:16 }}>My Support Path Over Time</div>
        <div style={{ display:"flex", gap:10, alignItems:"flex-end", height:110, marginBottom:10 }}>
          {STUDENT.sessionHistory.map((s,i) => {
            const h = s.path===null?16:s.path==="understand"?30:s.path==="start"?60:100;
            const bg = s.path===null?"#e8e8e8":s.path==="understand"?C.terra:s.path==="start"?C.amber:C.teal;
            return (
              <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                <div style={{ width:"100%", height:h, borderRadius:8, background:bg }}/>
                <div style={{ fontSize:13, color:C.textLt, fontWeight:700 }}>L{s.lesson}</div>
              </div>
            );
          })}
        </div>
        <div style={{ display:"flex", gap:16, flexWrap:"wrap", marginBottom:14 }}>
          {[{ color:C.terra, label:"Getting started" },{ color:C.amber, label:"Finding my way" },{ color:C.teal, label:"Got unstuck" }].map(({ color, label }) => (
            <div key={label} style={{ display:"flex", alignItems:"center", gap:7 }}>
              <div style={{ width:14, height:14, borderRadius:4, background:color }}/>
              <span style={{ fontSize:14, color:C.textMid }}>{label}</span>
            </div>
          ))}
        </div>
        <div style={{ background:C.tealPale, borderRadius:12, padding:"14px 16px" }}>
          <div style={{ fontSize:16, fontWeight:700, color:C.teal }}>🌟 Look at how your bar is getting taller, {STUDENT.nickname}. That is your growth.</div>
        </div>
      </div>
    </div>
  );

  // ── WORDS ─────────────────────────────────────────────────────────────────
  const WordsPage = () => (
    <div style={{ padding:"24px 20px 32px" }}>
      <div style={{ fontSize:26, fontWeight:900, color:C.navy, marginBottom:6 }}>My Words 📖</div>
      <div style={{ fontSize:16, color:C.textMid, marginBottom:24 }}>Math words from this module.</div>
      {[
        { en:"equal groups",      es:"grupos iguales",              ex:"3 equal groups of 8 = 24" },
        { en:"divide",            es:"dividir",                     ex:"24 ÷ 3 = 8" },
        { en:"how many groups",   es:"cuántos grupos",              ex:"How many groups of 4 fit in 24?" },
        { en:"same amount",       es:"la misma cantidad",           ex:"Each group has the same amount." },
        { en:"share equally",     es:"compartir en partes iguales", ex:"Share 36 crackers equally into 4 bags." },
      ].map(({ en, es, ex }) => (
        <div key={en} style={{ ...card, marginBottom:14 }}>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:10 }}>
            <div style={{ background:C.tealPale, borderRadius:10, padding:"8px 16px" }}>
              <div style={{ fontSize:17, fontWeight:800, color:C.teal }}>{en}</div>
            </div>
            <div style={{ background:C.amberPale, borderRadius:10, padding:"8px 16px" }}>
              <div style={{ fontSize:17, fontWeight:800, color:C.amberDeep }}>{es}</div>
            </div>
          </div>
          <div style={{ fontSize:15, color:C.textMid, fontStyle:"italic" }}>e.g. {ex}</div>
        </div>
      ))}
    </div>
  );

  // ── LESSON ────────────────────────────────────────────────────────────────
  // Single scrollable column. Input bar is sticky at bottom.
  const LessonPage = () => (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", minHeight:0 }}>

      {/* Scrollable content */}
      <div style={{ flex:1, overflowY:"auto", padding:"14px 16px 8px" }}>

        {/* Problem card */}
        <div style={{ background:"#fff", borderRadius:18, border:`2px solid ${C.tealPale}`, padding:"18px 20px", marginBottom:12, boxShadow:"0 2px 8px rgba(42,122,111,.06)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <span style={{ fontSize:13, fontWeight:800, color:C.teal, letterSpacing:.5, textTransform:"uppercase" }}>{problem.concept}</span>
            <span style={{ fontSize:13, color:C.textLt }}>Problem {probIdx+1} / {PROBLEMS.length}</span>
          </div>
          <p style={{ fontSize:18, fontWeight:600, color:C.navy, lineHeight:1.75, margin:0 }}>{problem.text}</p>

          {STUDENT.needsVisual && (
            <div style={{ marginTop:14, background:C.tealPale, borderRadius:14, padding:"14px 16px" }}>
              <div style={{ fontSize:12, fontWeight:800, color:C.teal, marginBottom:10, textTransform:"uppercase", letterSpacing:.5 }}>Picture of the problem</div>
              <GroupsVisual />
              <div style={{ fontSize:13, color:C.textMid, marginTop:8, fontStyle:"italic" }}>This shows one way to think about equal groups. Your groups might look different.</div>
            </div>
          )}

          <div style={{ marginTop:12, display:"flex", gap:6, flexWrap:"wrap" }}>
            {problem.spanishKey.split(" · ").map(v => (
              <span key={v} style={{ fontSize:12, fontWeight:700, background:C.amberPale, border:`1px solid ${C.amber}44`, color:C.amberDeep, padding:"4px 10px", borderRadius:20 }}>{v}</span>
            ))}
          </div>
        </div>

        {/* Tool row */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8, marginBottom:12 }}>
          {[
            { id:"sketch", icon:"✏️", label:"Sketchpad", active:showSketch, fn:() => { setShowSketch(s=>!s); setShowFrames(false); setShowVocab(false); } },
            { id:"frames", icon:"💬", label:"Math Talk",  active:showFrames, fn:() => { setShowFrames(s=>!s); setShowSketch(false); setShowVocab(false); } },
            { id:"vocab",  icon:"📖", label:"Key Words",  active:showVocab,  fn:() => { setShowVocab(s=>!s);  setShowSketch(false); setShowFrames(false); } },
          ].map(({ id, icon, label, active, fn }) => (
            <button key={id} onClick={fn}
              style={{ padding:"14px 8px", borderRadius:14, border:`2px solid ${active?C.teal:"#e8e8e8"}`, background: active?C.tealPale:"#fff", color: active?C.teal:C.textMid, fontWeight:700, fontSize:14, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
              <span style={{ fontSize:24 }}>{icon}</span>
              <span style={{ lineHeight:1.2, textAlign:"center" }}>{label}</span>
            </button>
          ))}
          <button onClick={useHint} disabled={hintsUsed >= problem.hints.length || phase==="released"}
            style={{ padding:"14px 8px", borderRadius:14, border:`2px solid ${hintsUsed<problem.hints.length?C.amber+"88":"#e8e8e8"}`, background: hintsUsed<problem.hints.length?C.amberPale:"#f5f5f5", color: hintsUsed<problem.hints.length?C.amberDeep:C.textLt, fontWeight:700, fontSize:14, cursor: hintsUsed<problem.hints.length&&phase!=="released"?"pointer":"not-allowed", display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:24 }}>💡</span>
            <span style={{ lineHeight:1.2, textAlign:"center" }}>Hint {hintsUsed}/{problem.hints.length}</span>
          </button>
        </div>

        {/* Open tools */}
        {showSketch && (
          <div style={{ marginBottom:12 }}>
            <Sketchpad />
          </div>
        )}

        {showFrames && (
          <div style={{ background:"#fff", borderRadius:16, border:`2px solid ${C.amber}66`, padding:"16px 18px", marginBottom:12 }}>
            <div style={{ fontSize:16, fontWeight:800, color:C.amberDeep, marginBottom:12 }}>💬 Click a frame to use it</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:9 }}>
              {FRAMES.map(f => (
                <button key={f} onClick={() => { setFrame(f); setInput(f); inputRef.current?.focus(); }}
                  style={{ padding:"10px 18px", borderRadius:22, border:`2px solid ${frame===f?C.teal:"#e0e0e0"}`, background: frame===f?C.tealPale:"#fff", color: frame===f?C.teal:C.textMid, fontWeight: frame===f?800:500, fontSize:15, cursor:"pointer" }}>
                  {f}
                </button>
              ))}
            </div>
          </div>
        )}

        {showVocab && (
          <div style={{ background:"#fff", borderRadius:16, border:`2px solid ${C.amber}66`, padding:"16px 18px", marginBottom:12 }}>
            <div style={{ fontSize:16, fontWeight:800, color:C.amberDeep, marginBottom:10 }}>📖 Key words for this problem</div>
            <div style={{ fontSize:16, color:C.text, lineHeight:2, background:C.amberPale, padding:"14px 18px", borderRadius:12 }}>
              {problem.spanishKey}
            </div>
          </div>
        )}

        {/* Chat messages */}
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {msgs.length === 0 && (
            <div style={{ textAlign:"center", padding:"32px 20px", color:C.textLt, fontSize:16 }}>
              Brilla is ready. Your message starts the conversation.
            </div>
          )}
          {msgs.map((msg, i) => (
            <div key={i} style={{ display:"flex", justifyContent: msg.from==="ai"?"flex-start":"flex-end" }}>
              <div style={{ maxWidth:"82%" }}>
                <div style={{ fontSize:13, fontWeight:800, marginBottom:5, letterSpacing:.5, color: msg.from==="ai"?C.teal:C.amberDeep }}>
                  {msg.from==="ai" ? "BRILLA" : STUDENT.nickname.toUpperCase()}
                </div>
                <div style={{
                  padding:"16px 20px",
                  borderRadius: msg.from==="ai"?"6px 20px 20px 20px":"20px 6px 20px 20px",
                  background:
                    msg.special==="release"    ? C.tealPale :
                    msg.special==="transition" ? C.amberPale :
                    msg.special==="hint"       ? "#fffbef" :
                    msg.from==="ai"            ? "#fff" : C.teal,
                  border:
                    msg.special==="release"    ? `2px solid ${C.teal}` :
                    msg.special==="transition" ? `2px solid ${C.amber}` :
                    msg.special==="hint"       ? `2px solid ${C.amber}66` :
                    msg.from==="ai"            ? `1.5px solid ${C.tealPale}` : "none",
                  color: msg.from==="ai" ? C.text : "#fff",
                  fontSize: 17, lineHeight: 1.75, whiteSpace:"pre-line",
                  boxShadow: msg.from==="ai" ? "0 2px 8px rgba(42,122,111,.08)" : "none",
                }}>
                  {msg.special==="release"    && <div style={{ fontSize:22, marginBottom:8 }}>✨</div>}
                  {msg.special==="transition" && <div style={{ fontSize:22, marginBottom:8 }}>📝</div>}
                  {msg.text}
                </div>
              </div>
            </div>
          ))}

          {typing && (
            <div style={{ display:"flex", justifyContent:"flex-start" }}>
              <div style={{ padding:"16px 20px", borderRadius:"6px 20px 20px 20px", background:"#fff", border:`1.5px solid ${C.tealPale}`, display:"flex", gap:7, alignItems:"center" }}>
                {[0,1,2].map(i => <div key={i} style={{ width:9, height:9, borderRadius:"50%", background:C.teal, animation:"bounce 1.2s infinite", animationDelay:`${i*0.2}s` }}/>)}
              </div>
            </div>
          )}
          <div ref={endRef} style={{ paddingBottom:8 }}/>
        </div>
      </div>

      {/* Sticky input */}
      <div style={{ padding:"10px 16px 14px", borderTop:`1.5px solid ${C.tealPale}`, background:C.cream, flexShrink:0 }}>
        {phase==="released" ? (
          <div style={{ background:C.tealPale, borderRadius:16, padding:"18px 20px", textAlign:"center", border:`2px solid ${C.teal}` }}>
            <div style={{ fontSize:18, fontWeight:800, color:C.teal, marginBottom:6 }}>✓ You are ready for independent work!</div>
            <p style={{ fontSize:16, color:C.textMid, margin:"0 0 12px" }}>Go work through the rest in your workbook. Write your thinking as you go.</p>
            {probIdx < PROBLEMS.length-1 && (
              <button onClick={() => {
                setProbIdx(i=>i+1); setPhase("building"); setReadyShown(false);
                setHintsUsed(0); setShowSketch(false); setShowFrames(false); setShowVocab(false);
                setMsgs([{ from:"ai", text:`Nice work, ${STUDENT.nickname}! Here is the next problem.\n\nRead it through and tell me: what is the first thing you notice?` }]);
              }} style={{ padding:"13px 30px", borderRadius:14, background:C.teal, color:"#fff", border:"none", fontWeight:800, fontSize:16, cursor:"pointer" }}>
                Next problem with Brilla →
              </button>
            )}
          </div>
        ) : (
          <>
            <div style={{ background:"#fff", borderRadius:16, border:`2px solid ${C.tealPale}`, display:"flex", alignItems:"center", gap:8, padding:"10px 10px 10px 18px", boxShadow:"0 2px 8px rgba(42,122,111,.07)" }}>
              <input
                ref={inputRef}
                style={{ flex:1, border:"none", outline:"none", fontSize:17, color:C.text, background:"transparent", fontFamily:"inherit" }}
                placeholder={
                  phase==="cfu_wait" ? "Solve it in your workbook first, then type your answer here..." :
                  spanish ? "Escribe en español o inglés / Write in Spanish or English..." :
                  "Type your thinking here..."
                }
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key==="Enter" && send()}
              />
              <button onClick={() => send()} disabled={!input.trim()||typing}
                style={{ padding:"13px 26px", borderRadius:14, background: !input.trim()||typing?"#e8e8e8":C.teal, color: !input.trim()||typing?C.textLt:"#fff", border:"none", fontWeight:800, fontSize:16, cursor: !input.trim()||typing?"not-allowed":"pointer" }}>
                Send →
              </button>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", marginTop:6, padding:"0 2px" }}>
              <span style={{ fontSize:13, color:C.textLt }}>🔒 Nothing you type is saved.</span>
              <span style={{ fontSize:13, color:C.textLt }}>🌐 1 of 12 supported languages</span>
            </div>
          </>
        )}
      </div>
    </div>
  );

  // ── ROOT ──────────────────────────────────────────────────────────────────
  return (
    <div style={{ fontFamily:"'Nunito', sans-serif", background:C.cream, minHeight:"100vh", display:"flex", flexDirection:"column" }}>

      {/* TOP BAR */}
      <div style={{ background:"#fff", borderBottom:`2px solid ${C.tealPale}`, padding:"12px 22px", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 2px 8px rgba(42,122,111,.06)", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <div style={{ width:46, height:46, borderRadius:"50%", background:`linear-gradient(135deg,${C.teal},${C.tealMid})`, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:900, fontSize:20 }}>
            {STUDENT.nickname[0]}
          </div>
          <div>
            <div style={{ fontSize:18, fontWeight:900, color:C.navy }}>{STUDENT.nickname}</div>
            <div style={{ fontSize:13, color:C.textLt }}>Scholar {STUDENT.scholarCode} · Grade {STUDENT.grade} · {STUDENT.proficiencyLevel}</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <button onClick={() => { setSpanish(s=>!s); if (!spanish) setMsgs(prev => [...prev, { from:"ai", text:`Cambiando a apoyo bilingüe, ${STUDENT.nickname}. 🌐\nPuedes escribir en español o en inglés. / You can write in Spanish or English.` }]); }}
            style={{ padding:"10px 20px", borderRadius:24, border:`2px solid ${spanish?C.amber:"#ddd"}`, background: spanish?C.amberPale:"#fff", color: spanish?C.amberDeep:C.textMid, fontWeight:800, fontSize:15, cursor:"pointer" }}>
            🌐 Español
          </button>
          {teacherSignal && (
            <div style={{ padding:"9px 16px", borderRadius:24, background:C.tealPale, border:`2px solid ${C.teal}`, fontSize:14, fontWeight:700, color:C.teal }}>
              ✓ Ms. Reyes knows you are ready
            </div>
          )}
          <div style={{ padding:"9px 14px", borderRadius:24, background:"#f5f5f5", fontSize:13, color:C.textLt }}>🔒 Session only</div>
        </div>
      </div>

      {/* BODY — flex row, no overflow:hidden */}
      <div style={{ flex:1, display:"flex", minHeight:0 }}>

        {/* LEFT NAV */}
        <div style={{ width:230, background:"#fff", borderRight:`2px solid ${C.tealPale}`, padding:"18px 12px 24px", display:"flex", flexDirection:"column", gap:4, flexShrink:0, overflowY:"auto" }}>
          <div style={{ fontSize:11, fontWeight:900, color:C.textLt, letterSpacing:1, textTransform:"uppercase", padding:"0 8px", marginBottom:8 }}>My Dashboard</div>
          <NavItem icon="🏠" label="Home"           active={nav==="home"}   onClick={() => setNav("home")}/>
          <NavItem icon="📐" label="Today's Lesson" active={nav==="lesson"} onClick={() => setNav("lesson")} badge={phase!=="released"?"!":null}/>
          <NavItem icon="🌱" label="My Growth"      active={nav==="growth"} onClick={() => setNav("growth")}/>
          <NavItem icon="📖" label="My Words"       active={nav==="words"}  onClick={() => setNav("words")}/>

          <div style={{ flex:1 }}/>

          {/* Mood */}
          <div style={{ borderTop:`1px solid ${C.tealPale}`, paddingTop:14 }}>
            <div style={{ fontSize:12, fontWeight:800, color:C.textLt, letterSpacing:.5, textTransform:"uppercase", marginBottom:10, padding:"0 6px" }}>How am I feeling?</div>
            {[{ v:"great",e:"😊",l:"Great" },{ v:"okay",e:"😐",l:"Okay" },{ v:"stuck",e:"😕",l:"Stuck" }].map(({ v,e,l }) => (
              <button key={v} onClick={() => setMood(v)}
                style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 12px", borderRadius:12, width:"100%", border:`2px solid ${mood===v?C.teal:"transparent"}`, background: mood===v?C.tealPale:"transparent", color: mood===v?C.teal:C.textMid, fontWeight: mood===v?800:500, fontSize:16, cursor:"pointer", marginBottom:3, textAlign:"left" }}>
                <span style={{ fontSize:22 }}>{e}</span> {l}
              </button>
            ))}
            {mood && <div style={{ fontSize:13, color:C.textMid, padding:"4px 8px", fontStyle:"italic" }}>{mood==="great"?"Keep that energy. ✨":mood==="okay"?"You are making progress.":"Being stuck is part of math."}</div>}
          </div>

          {/* Support paths */}
          {nav==="lesson" && (
            <div style={{ borderTop:`1px solid ${C.tealPale}`, paddingTop:14 }}>
              <div style={{ fontSize:12, fontWeight:800, color:C.textLt, letterSpacing:.5, textTransform:"uppercase", marginBottom:10, padding:"0 6px" }}>Where Am I?</div>
              {[
                { emoji:"😕", label:"I don't understand",                msg:"I don't understand what this problem is asking me to do", color:C.terra,    bg:C.terraPale },
                { emoji:"🤔", label:"I get it but don't know where to start", msg:"I kind of get it but I don't know where to start",    color:C.amber,    bg:C.amberPale },
                { emoji:"💡", label:"I started but got stuck",            msg:"I started but I got stuck",                              color:C.teal,     bg:C.tealPale  },
              ].map(({ emoji, label, msg, color, bg }) => (
                <button key={label} onClick={() => send(msg)} disabled={phase==="released"}
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"13px 12px", borderRadius:14, width:"100%", border:`2px solid ${color}33`, background:bg, color:C.navy, fontWeight:700, fontSize:14, cursor: phase==="released"?"not-allowed":"pointer", marginBottom:8, textAlign:"left", opacity: phase==="released"?.5:1 }}>
                  <span style={{ fontSize:24, flexShrink:0 }}>{emoji}</span>
                  <span style={{ lineHeight:1.3 }}>{label}</span>
                </button>
              ))}
            </div>
          )}
        </div>

        {/* MAIN — each page handles its own scroll */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", minHeight:0, overflowY: nav==="lesson"?"hidden":"auto" }}>
          {nav==="home"   && <HomePage/>}
          {nav==="lesson" && <LessonPage/>}
          {nav==="growth" && <GrowthPage/>}
          {nav==="words"  && <WordsPage/>}
        </div>
      </div>

      <style>{`
        @keyframes bounce {
          0%,100% { transform:translateY(0); }
          50%      { transform:translateY(-5px); }
        }
      `}</style>
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(BrillaStudentDashboard));
</script>
</body>
</html>
