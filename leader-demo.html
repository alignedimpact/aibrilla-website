function getCycleStage(obs) {
  const p = obs.filter(o=>o.present).length;
  const c = obs.filter(o=>o.consistent).length;
  const t = obs.length;
  if (c >= t*0.7) return "Sustain";
  if (c >= t*0.4) return "Deepen";
  if (p >= t*0.5) return "Develop";
  return "Introduce";
}

function getRecommendation(stage, obs, focus) {
  const p = obs.filter(o=>o.present).length;
  const c = obs.filter(o=>o.consistent).length;
  const strong = CLASSROOMS.filter(r=>r.strongImplementer).map(r=>r.teacher);
  const notYet = CLASSROOMS.filter(r=>!r.strongImplementer).slice(0,2).map(r=>r.teacher);
  if (stage==="Introduce") return { action:"Professional Learning", icon:"📚", color:C.navy, bg:C.navyPale, timeframe:"This week",
    rationale:`Only ${p} of ${obs.length} walkthroughs show evidence of ${focus.short}. The team needs a shared understanding before moving to practice. Ground the PL in student portal data.`,
    nextStep:`Design a 45-minute PL session using one student scenario that shows what happens when ${focus.short} is present versus absent. Use Brilla student session data as the anchor.` };
  if (stage==="Develop") return { action:"Teach Back", icon:"🎯", color:C.teal, bg:C.tealPale, timeframe:"Next staff meeting",
    rationale:`${p} of ${obs.length} teachers are attempting ${focus.short} but only ${c} are implementing consistently. A Teach Back gives the team a low-stakes opportunity to practice the move before students are watching.`,
    nextStep:`Invite ${strong[0]||"a strong implementer"} to lead a 20-minute Teach Back at your next staff meeting. Colleagues observe with one lens: does every ML student have an on-ramp before whole group opens?` };
  if (stage==="Deepen") return { action:"Peer Observation", icon:"👁", color:C.amberDeep, bg:C.amberPale, timeframe:"Within 2 weeks",
    rationale:`${c} classrooms show consistent implementation. The strongest implementers are ${strong.slice(0,2).join(" and ")}. Peer observation is more credible than leader coaching at this stage because it comes from a colleague.`,
    nextStep:`Pair ${notYet.join(" and ")} with ${strong[0]||"a strong implementer"} for a structured peer observation. Give observers one specific look-for. Debrief the same day.` };
  return { action:"Collaborative Planning with Focus", icon:"🤝", color:C.teal, bg:C.tealPale, timeframe:"Next PLC",
    rationale:`${c} of ${obs.length} classrooms show strong consistent implementation. Student engagement data reflects this shift. Time to move the work from leader-driven to teacher-owned.`,
    nextStep:`At your next grade-level PLC, give teams 30 minutes to plan one lesson with ${focus.short} as the explicit design constraint. Ask: where does every ML need an on-ramp?` };
}

function generateBrief(room, focus) {
  return {
    mlContext:`${room.mlCount} ML students of ${room.totalStudents} total. ${room.engagement}% session engagement this week. Trend: ${room.trend==="up"?"↑ improving":room.trend==="down"?"↓ needs attention":"→ holding steady"}. Currently on ${room.lesson}.`,
    entryMove:`Your one lens today is: ${focus.short}. You are not looking for everything. You are looking for whether every ML student had a structured on-ramp before the whole group share.`,
    lookFor: focus.lookFor,
    questionToAsk:`Find one student and ask: "Tell me what you are working on. How did you get started?" Listen for whether they reference partner talk, a sentence frame, or their own thinking.`,
    noShow:`If ${focus.short} is not present, name what you saw specifically in your debrief. Not "you should use wait time" but "I noticed the whole group share opened about 8 seconds after the question. What would 30 seconds of partner talk look like there?"`,
  };
}

function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => { const fn=()=>setMobile(window.innerWidth<768); window.addEventListener("resize",fn); return ()=>window.removeEventListener("resize",fn); },[]);
  return mobile;
}

function StageBadge({ stage }) {
  const map = { Introduce:{color:C.terra,bg:C.terraPale,icon:"🌱"}, Develop:{color:C.amberDeep,bg:C.amberPale,icon:"🔨"}, Deepen:{color:C.teal,bg:C.tealPale,icon:"🔍"}, Sustain:{color:C.navy,bg:C.navyPale,icon:"✨"} };
  const s = map[stage];
  return <span style={{ padding:"6px 14px", borderRadius:20, fontSize:13, fontWeight:800, background:s.bg, color:s.color }}>{s.icon} {stage}</span>;
}

        <div key={i} style={{ ...card({ marginBottom:10, padding:"14px 18px" }) }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:o.note?8:0, flexWrap:"wrap" }}>
            <div style={{ fontSize:14, fontWeight:800, color:C.navy }}>{o.teacher}</div>
            <div style={{ fontSize:12, color:C.textLt }}>{o.date}</div>
            <div style={{ marginLeft:"auto", display:"flex", gap:6 }}>
              {o.present?<span style={{ padding:"3px 10px", borderRadius:20, fontSize:12, fontWeight:700, background:C.tealPale, color:C.teal }}>Present</span>:<span style={{ padding:"3px 10px", borderRadius:20, fontSize:12, fontWeight:700, background:C.terraPale, color:C.terra }}>Not yet</span>}
              {o.present&&o.consistent?<span style={{ padding:"3px 10px", borderRadius:20, fontSize:12, fontWeight:700, background:"#eef7ee", color:"#2d7a2d" }}>Consistent ✓</span>:o.present?<span style={{ padding:"3px 10px", borderRadius:20, fontSize:12, fontWeight:700, background:C.amberPale, color:C.amberDeep }}>Partial</span>:null}
            </div>
          </div>
          {o.note&&<div style={{ fontSize:13, color:C.textMid, lineHeight:1.6, fontStyle:"italic" }}>"{o.note}"</div>}
        </div>
      ))}
    </div>
  );

  // ── PROGRESS ──────────────────────────────────────────────────────────────
  const ProgressPage = () => {
    const readyToMove = stage==="Sustain";
    return (
      <div style={{ padding:"20px 16px 40px" }}>
        <div style={{ fontSize:isMobile?20:22, fontWeight:900, color:C.navy, marginBottom:8 }}>📊 Progress Tracker</div>
        <div style={{ background:C.tealPale, borderRadius:14, padding:"13px 16px", marginBottom:18, border:`1.5px solid rgba(42,122,111,.15)` }}>
          <div style={{ fontSize:14, fontWeight:800, color:C.teal, marginBottom:5 }}>What is this?</div>
          <p style={{ fontSize:13, color:C.text, lineHeight:1.7, margin:"0 0 6px" }}>The Progress Tracker shows implementation trends per classroom and school-wide student engagement data for your current focus area. When 70% of classrooms show consistent implementation alongside a positive student data shift, Brilla surfaces a readiness signal — meaning it is time to choose a new focus and begin the cycle again.</p>
          <p style={{ fontSize:13, color:C.textMid, lineHeight:1.65, margin:0 }}>Groupings change as students grow. This tracker helps you see which classrooms are ready for the next instructional challenge and which ones need continued support.</p>
        </div>
        <div style={{ fontSize:14, color:C.textMid, marginBottom:16 }}>Current focus: <strong>{focus.title}</strong></div>
        <div style={card()}>
          <div style={{ fontSize:15, fontWeight:800, color:C.navy, marginBottom:14 }}>Cycle Stage</div>
          <div style={{ display:"flex", gap:0, marginBottom:16 }}>
            {["Introduce","Develop","Deepen","Sustain"].map((s,i)=>{
              const stageList=["Introduce","Develop","Deepen","Sustain"];
              const ci=stageList.indexOf(stage);
              const isActive=s===stage;
              const isPast=stageList.indexOf(s)<ci;
              const sc={Introduce:C.terra,Develop:C.amberDeep,Deepen:C.teal,Sustain:C.navy};
              return (
                <div key={s} style={{ flex:1, textAlign:"center" }}>
                  <div style={{ width:"100%", height:6, background:isPast||isActive?sc[s]:"#e0e0e0", borderRadius:i===0?"6px 0 0 6px":i===3?"0 6px 6px 0":"0", marginBottom:8 }}/>
                  <div style={{ fontSize:12, fontWeight:isActive?900:600, color:isActive?sc[s]:C.textLt }}>{s}</div>
                  {isActive&&<div style={{ fontSize:9, color:sc[s], fontWeight:800, marginTop:2 }}>← here</div>}
                </div>
              );
            })}
          </div>
        </div>
        <div style={card()}>
          <div style={{ fontSize:15, fontWeight:800, color:C.navy, marginBottom:14 }}>What Your Data Shows</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
            <div style={{ background:C.tealPale, borderRadius:14, padding:"16px" }}>
              <div style={{ fontSize:26, fontWeight:900, color:C.teal }}>{presentCount}/{obs.length}</div>
              <div style={{ fontSize:13, color:C.textMid, marginTop:4 }}>Move present</div>
            </div>
            <div style={{ background:consistentCount>=obs.length*0.5?"#eef7ee":C.amberPale, borderRadius:14, padding:"16px" }}>
              <div style={{ fontSize:26, fontWeight:900, color:consistentCount>=obs.length*0.5?"#2d7a2d":C.amberDeep }}>{consistentCount}/{obs.length}</div>
              <div style={{ fontSize:13, color:C.textMid, marginTop:4 }}>Consistent</div>
            </div>
          </div>
          {CLASSROOMS.map(room=>{
            const o=obs.find(x=>x.room===room.id);
            return (
              <div key={room.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:`1px solid ${C.tealPale}` }}>
                <div style={{ width:80, fontSize:12, fontWeight:700, color:C.navy, flexShrink:0 }}>{room.teacher.split(" ")[1]||room.teacher}</div>
                <div style={{ flex:1, height:8, background:"#e8e8e8", borderRadius:5 }}>
                  <div style={{ height:"100%", borderRadius:5, background:!o?"#e8e8e8":o.consistent?C.teal:o.present?C.amber:C.terra, width:!o?"0%":o.consistent?"100%":o.present?"60%":"20%", transition:"width .4s ease" }}/>
                </div>
                <div style={{ width:76, fontSize:12, fontWeight:700, color:!o?C.textLt:o.consistent?C.teal:o.present?C.amberDeep:C.terra, textAlign:"right", flexShrink:0 }}>
                  {!o?"Not visited":o.consistent?"Consistent":o.present?"Present":"Not yet"}
                </div>
              </div>
            );
          })}
        </div>
        <div style={card()}>
          <div style={{ fontSize:15, fontWeight:800, color:C.navy, marginBottom:14 }}>Student Engagement Trend</div>
          <div style={{ display:"flex", gap:8, alignItems:"flex-end", height:90, marginBottom:10 }}>
            {[48,52,56,58,62,65].map((v,i)=>(
              <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                <div style={{ width:"100%", height:v, borderRadius:"6px 6px 0 0", background:i<3?C.amberPale:C.tealPale, border:`2px solid ${i<3?C.amber:C.teal}` }}/>
                <div style={{ fontSize:11, color:C.textLt, fontWeight:700 }}>W{i+1}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize:13, color:C.textMid, lineHeight:1.65 }}>Average ML engagement increased from 48% to 65% over 6 weeks, aligned with the current coaching focus on {focus.short}.</div>
        </div>
        {readyToMove ? (
          <div style={{ background:C.tealPale, borderRadius:18, padding:"20px 22px", border:`2px solid ${C.teal}` }}>
            <div style={{ fontSize:22, marginBottom:10 }}>✨</div>
            <div style={{ fontSize:16, fontWeight:900, color:C.teal, marginBottom:8 }}>The system suggests you are ready to move to a new focus.</div>
            <p style={{ fontSize:14, color:C.text, lineHeight:1.7, margin:"0 0 14px" }}>{consistentCount} of {obs.length} classrooms show consistent implementation. Student engagement data reflects this shift.</p>
            <button onClick={()=>setShowFocusPicker(true)} style={{ padding:"12px 24px", borderRadius:14, background:C.teal, color:"#fff", border:"none", fontWeight:800, fontSize:15, cursor:"pointer" }}>Choose Next Focus →</button>
          </div>
        ) : (
          <div style={{ background:C.creamMid, borderRadius:16, padding:"18px 20px", border:`1.5px solid ${C.tealPale}` }}>
            <div style={{ fontSize:14, fontWeight:700, color:C.textMid, lineHeight:1.7 }}>The system signals readiness when consistent implementation reaches 70%+ of classrooms with a positive shift in student engagement data. Keep logging observations.</div>
          </div>
        )}
      </div>
    );
  };

  // ── FOCUS LIBRARY ─────────────────────────────────────────────────────────
  const FocusPage = () => (
    <div style={{ padding:"20px 16px 40px" }}>
      <div style={{ fontSize:isMobile?20:22, fontWeight:900, color:C.navy, marginBottom:8 }}>🎯 Focus Library</div>
      <div style={{ background:C.tealPale, borderRadius:14, padding:"13px 16px", marginBottom:20, border:`1.5px solid rgba(42,122,111,.15)` }}>
        <div style={{ fontSize:14, fontWeight:800, color:C.teal, marginBottom:5 }}>What is this?</div>
        <p style={{ fontSize:13, color:C.text, lineHeight:1.7, margin:"0 0 6px" }}>These are five high-leverage instructional moves specifically chosen for their impact on multilingual learners' access to grade-level math. Each focus area is supported by research, connected to what students experience in their Brilla portals, and tied to a four-stage coaching cycle.</p>
        <p style={{ fontSize:13, color:C.textMid, lineHeight:1.65, margin:0 }}>Choose one focus at a time. When you select a focus here, it pins connected professional learning resources to your teachers' Brilla dashboards — so your coaching and their learning are always aligned.</p>
      </div>
      {FOCUS_LIBRARY.map(f=>(
        <div key={f.id} style={{ ...card({ marginBottom:12, border:`2px solid ${focus.id===f.id?C.teal:C.tealPale}`, background:focus.id===f.id?C.tealPale:"#fff" }) }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
            <div style={{ fontSize:15, fontWeight:800, color:C.navy, flex:1, marginRight:10 }}>{f.title}</div>
            {focus.id===f.id
              ? <span style={{ padding:"4px 12px", borderRadius:20, fontSize:12, fontWeight:800, background:C.teal, color:"#fff", flexShrink:0 }}>Current</span>
              : <button onClick={()=>{ setFocus(f); setObs([]); }} style={{ padding:"4px 12px", borderRadius:20, fontSize:12, fontWeight:700, background:"#fff", color:C.teal, border:`1.5px solid ${C.teal}`, cursor:"pointer", flexShrink:0 }}>Set Focus</button>}
          </div>
          <p style={{ fontSize:14, color:C.text, lineHeight:1.7, margin:"0 0 10px" }}>{f.description}</p>
          <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"1fr 1fr", gap:8 }}>
            <div style={{ background:C.tealPale, borderRadius:10, padding:"10px 12px" }}>
              <div style={{ fontSize:11, fontWeight:800, color:C.teal, marginBottom:4, textTransform:"uppercase", letterSpacing:.5 }}>Student Signal</div>
              <div style={{ fontSize:13, color:C.text, lineHeight:1.55 }}>{f.studentSignal}</div>
            </div>
            <div style={{ background:C.amberPale, borderRadius:10, padding:"10px 12px" }}>
              <div style={{ fontSize:11, fontWeight:800, color:C.amberDeep, marginBottom:4, textTransform:"uppercase", letterSpacing:.5 }}>Teacher Move</div>
              <div style={{ fontSize:13, color:C.text, lineHeight:1.55 }}>{f.teacherMove}</div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );

  return (
    <div style={{ fontFamily:"'Nunito', sans-serif", background:C.cream, height:"100vh", display:"flex", flexDirection:"column" }}>
      {/* TOP BAR */}
      <div style={{ background:C.navy, padding:"12px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0, boxShadow:"0 2px 10px rgba(27,58,107,.2)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:38, height:38, borderRadius:10, background:`linear-gradient(135deg,${C.teal},${C.tealMid})`, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:900, fontSize:14 }}>MR</div>
          <div>
            <div style={{ fontSize:16, fontWeight:900, color:"#fff" }}>{LEADER.name}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.6)" }}>{LEADER.title} · {LEADER.school}</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <div style={{ padding:"6px 12px", borderRadius:20, background:"rgba(255,255,255,.1)", border:"1px solid rgba(255,255,255,.2)", fontSize:12, fontWeight:700, color:"#fff" }}>🎯 {focus.short}</div>
          <StageBadge stage={stage}/>
        </div>
      </div>

      <div style={{ flex:1, display:"flex", overflow:"hidden", minHeight:0 }}>
        {!isMobile&&(
          <div style={{ width:210, background:"#fff", borderRight:`2px solid ${C.tealPale}`, padding:"16px 10px 24px", display:"flex", flexDirection:"column", gap:3, flexShrink:0, overflowY:"auto" }}>
            <div style={{ fontSize:10, fontWeight:900, color:C.textLt, letterSpacing:1, textTransform:"uppercase", padding:"0 8px", marginBottom:8 }}>Leader Dashboard</div>
            {TABS.map(t=><SideNavItem key={t.id} icon={t.icon} label={t.label} active={nav===t.id} onClick={()=>setNav(t.id)} badge={t.badge}/>)}
            <div style={{ flex:1 }}/>
            <div style={{ borderTop:`1px solid ${C.tealPale}`, paddingTop:12, padding:"12px 8px 0" }}>
              <div style={{ padding:"12px 14px", background:C.tealPale, borderRadius:12, marginBottom:8 }}>
                <div style={{ fontSize:12, fontWeight:800, color:C.teal, marginBottom:4 }}>{focus.short}</div>
                <StageBadge stage={stage}/>
                <div style={{ marginTop:8, fontSize:12, color:C.textMid }}>{presentCount}/{obs.length} visited · {consistentCount} consistent</div>
              </div>
              <div style={{ padding:"12px 14px", background:rec.bg, borderRadius:12, border:`1.5px solid ${rec.color}22`, cursor:"pointer" }} onClick={()=>setNav("overview")}>
                <div style={{ fontSize:11, fontWeight:800, color:rec.color, marginBottom:4 }}>Next Action</div>
                <div style={{ fontSize:13, fontWeight:700, color:C.navy }}>{rec.icon} {rec.action}</div>
                <div style={{ fontSize:11, color:C.textMid, marginTop:3 }}>{rec.timeframe}</div>
              </div>
            </div>
          </div>
        )}
        <div style={{ flex:1, overflowY:"auto" }}>
          {nav==="overview" && <OverviewPage/>}
          {nav==="brief"    && <BriefPage/>}
          {nav==="log"      && <LogPage/>}
          {nav==="progress" && <ProgressPage/>}
          {nav==="language" && <LanguagePage/>}
          {nav==="focus"    && <FocusPage/>}
        </div>
      </div>

      {isMobile&&(
        <div style={{ background:"#fff", borderTop:`1.5px solid ${C.tealPale}`, display:"flex", flexShrink:0, boxShadow:"0 -2px 8px rgba(0,0,0,.06)" }}>
          {TABS.map(t=><BottomTab key={t.id} icon={t.icon} label={t.label} active={nav===t.id} onClick={()=>setNav(t.id)} badge={t.badge}/>)}
        </div>
      )}
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(BrillaLeaderDashboard));
</script>
</body>
</html>
