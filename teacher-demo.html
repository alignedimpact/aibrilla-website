// ── GROUPING SUGGESTIONS ENGINE ───────────────────────────────────────────
function getGroupingSuggestion(student) {
  const languageBarrier = ["Emerging","Developing"].includes(student.level);
  const conceptBarrier = student.support==="understand";
  const contentBarrier = student.support==="start";
  const nearReclass = student.reclass;

  if(conceptBarrier && languageBarrier) return {
    type:"Tier 2 — Language + Concept",
    color:C.terra,bg:C.terraPale,
    focus:"This student needs both a language entry point AND conceptual scaffolding before they can access the task.",
    groupWith:STUDENTS.filter(s=>s.code!==student.code&&s.support==="understand"&&["Emerging","Developing"].includes(s.level)).slice(0,2).map(s=>s.name),
    teacherMove:"Lead with the story context before any numbers. Use home language if possible. Provide the area model template with labels already filled in for the decomposition step.",
    brilla:"Brilla will guide through full Three Reads sequence with numbers hidden on first read. Session will not advance to math until language access is confirmed.",
    expiry:"Revisit grouping after 3 sessions. Watch for shift from 'I don't understand' to 'I started but got stuck.'"
  };

  if(conceptBarrier) return {
    type:"Tier 2 — Conceptual Access",
    color:C.amberDeep,bg:C.amberPale,
    focus:"This student understands the language but does not yet have a conceptual entry point for this type of problem.",
    groupWith:STUDENTS.filter(s=>s.code!==student.code&&s.support==="understand"&&!["Emerging","Developing"].includes(s.level)).slice(0,2).map(s=>s.name),
    teacherMove:"Use concrete manipulatives before the area model. Start with smaller numbers (e.g. 2×13) to establish the structure, then scale up to 24×13.",
    brilla:"Brilla will offer the area model visual and ask the student to identify what each section represents before attempting to calculate.",
    expiry:"Revisit after 2 sessions. Watch for student initiating the decomposition step without prompting."
  };

  if(contentBarrier) return {
    type:"Tier 2 — Content-Specific",
    color:C.teal,bg:C.tealPale,
    focus:"This student can enter the task but gets stuck at a specific point — likely the transition from the concrete model to recording partial products symbolically.",
    groupWith:STUDENTS.filter(s=>s.code!==student.code&&s.support==="start").slice(0,2).map(s=>s.name),
    teacherMove:"Ask the student to verbalize what they see in the area model before writing anything. The gap is often between understanding the visual and translating it to notation.",
    brilla:"Brilla will ask: what does each section of your area model mean in numbers? Only after verbal explanation will it prompt recording.",
    expiry:"Revisit after 3 sessions. Watch for student self-correcting notation without prompting."
  };

  if(nearReclass) return {
    type:"Reclassification Support",
    color:C.navy,bg:"#E8EFF8",
    focus:"This student is approaching reclassification criteria. They need opportunities to demonstrate academic language at the discourse level.",
    groupWith:STUDENTS.filter(s=>s.code!==student.code&&s.support==="stuck"&&s.reclass).slice(0,1).map(s=>s.name),
    teacherMove:"Give this student the discussion leader role during debrief. Ask them to explain another student's strategy in their own words.",
    brilla:"Brilla will push for full mathematical explanations using academic language. Bilingual toggle use should be decreasing at this stage.",
    expiry:"Revisit monthly against ELPAC/framework data."
  };

  return {
    type:"On Track — Monitor",
    color:C.teal,bg:C.tealPale,
    focus:"This student is engaging productively. Continue monitoring session trends.",
    groupWith:[],
    teacherMove:"Give this student the explainer role in partner work. Their reasoning can be a model for peers.",
    brilla:"Brilla will push for deeper mathematical justification and connection to the standard algorithm.",
    expiry:"No grouping change needed at this time."
  };
}

                      <span style={{fontSize:12,fontWeight:700,background:"#fff",color:topic.color,padding:"3px 10px",borderRadius:20,border:`1px solid ${topic.color}44`}}>{topic.tag}</span>
                    </div>
                    <span style={{fontSize:12,fontWeight:800,background:C.amberPale,color:C.amberDeep,padding:"5px 12px",borderRadius:20,flexShrink:0,border:`1px solid ${C.amber}44`}}>Coming Soon</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* All resources */}
        <div style={{fontSize:16,fontWeight:800,color:C.navy,marginBottom:12}}>All Resources</div>

        {/* Tag legend */}
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
          {[
            {color:C.teal,label:"ML + All Students"},
            {color:C.navy,label:"ML Focus"},
            {color:C.amberDeep,label:"All Students"},
          ].map(({color,label})=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:color}}/>
              <span style={{fontSize:13,color:C.textMid,fontWeight:600}}>{label}</span>
            </div>
          ))}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {unpinned.map(topic=>(
            <div key={topic.id} style={{background:"#fff",borderRadius:12,padding:"14px 16px",border:`1.5px solid ${C.tealPale}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:C.navy,marginBottom:5}}>{topic.title}</div>
                <span style={{fontSize:12,fontWeight:700,background:topic.color==="navy"?"#E8EFF8":topic.color===C.amberDeep?C.amberPale:C.tealPale,color:topic.color,padding:"3px 10px",borderRadius:20}}>{topic.tag}</span>
              </div>
              <span style={{fontSize:12,fontWeight:800,background:C.amberPale,color:C.amberDeep,padding:"5px 12px",borderRadius:20,flexShrink:0,border:`1px solid ${C.amber}44`}}>Coming Soon</span>
            </div>
          ))}
        </div>

        <div style={{marginTop:20,padding:"14px 18px",background:C.creamMid,borderRadius:14,border:`1.5px solid ${C.tealPale}`}}>
          <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:4}}>More coming soon</div>
          <p style={{fontSize:13,color:C.textMid,lineHeight:1.65,margin:0}}>Resources will be added throughout the pilot. If there is a topic you want to see, share it through the feedback form at aibrilla.com.</p>
        </div>
      </div>
    );
  };

  const TABS=[
    {id:"overview",icon:"📊",label:"Overview"},
    {id:"roadmap", icon:"🗺️",label:"Roadmap"},
    {id:"heatmap", icon:"🔥",label:"Heatmap"},
    {id:"language",icon:"📈",label:"Language"},
    {id:"family",  icon:"💬",label:"Family",badge:unreadFamily>0?unreadFamily:null},
    {id:"learning",icon:"📚",label:"Learning"},
  ];

  // ── ROOT ─────────────────────────────────────────────────────────────
  return(
    <div style={{fontFamily:"'Nunito',sans-serif",background:C.cream,height:"100vh",display:"flex",flexDirection:"column"}}>

      {/* DEMO BANNER */}
      <div style={{background:C.amberPale,borderTop:`3px solid ${C.amber}`,padding:"7px 20px",textAlign:"center",fontSize:13,color:C.amberDeep,fontWeight:700,flexShrink:0}}>
        🎯 Interactive Demo — AI responses are illustrative examples. Follow italicized prompts to explore.
      </div>

      {/* TOP BAR */}
      <div style={{background:C.navy,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,boxShadow:"0 2px 10px rgba(27,58,107,.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:"50%",background:`linear-gradient(135deg,${C.teal},${C.tealMid})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:15}}>MR</div>
          <div>
            <div style={{fontSize:17,fontWeight:900,color:"#fff"}}>{TEACHER.name}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,.6)"}}>Grade {TEACHER.grade} · Room {TEACHER.room} · {TEACHER.framework}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {lessonConfirmed&&<div style={{padding:"7px 14px",borderRadius:20,background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.2)",fontSize:13,fontWeight:700,color:"#fff"}}>📐 4.NBT.B.5</div>}
          {unreadFamily>0&&<button onClick={()=>setNav("family")} style={{width:32,height:32,borderRadius:"50%",background:"#e53935",border:"none",color:"#fff",fontWeight:900,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{unreadFamily}</button>}
        </div>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
        {!isMobile&&(
          <div style={{width:210,background:"#fff",borderRight:`2px solid ${C.tealPale}`,padding:"16px 10px 24px",display:"flex",flexDirection:"column",gap:3,flexShrink:0,overflowY:"auto"}}>
            <div style={{fontSize:13,fontWeight:900,color:C.textLt,letterSpacing:1,textTransform:"uppercase",padding:"0 8px",marginBottom:8}}>Teacher Dashboard</div>
            {TABS.map(t=><SideNavItem key={t.id} icon={t.icon} label={t.label} active={nav===t.id} onClick={()=>setNav(t.id)} badge={t.badge}/>)}
            <div style={{flex:1}}/>
            <div style={{borderTop:`1px solid ${C.tealPale}`,paddingTop:12}}>
              {[{label:"With Brilla",count:statusCounts.brilla,color:C.teal,bg:C.tealPale},{label:"CFU",count:statusCounts.cfu,color:C.amberDeep,bg:C.amberPale},{label:"Independent",count:statusCounts.independent,color:"#2d7a2d",bg:"#eef7ee"}].map(({label,count,color,bg})=>(
                <div key={label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",borderRadius:10,background:bg,marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:600,color}}>{label}</span>
                  <span style={{fontSize:16,fontWeight:900,color}}>{count}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,overflowY:nav==="reflect"?"hidden":"auto"}}>
          {nav==="overview"&&<OverviewPage/>}
          {nav==="roadmap" &&<RoadmapPage/>}
          {nav==="reflect" &&<ReflectPage/>}
          {nav==="heatmap" &&<HeatmapPage/>}
          {nav==="language"&&<LanguagePage/>}
          {nav==="family"  &&<FamilyPage/>}
          {nav==="learning"&&<LearningPage/>}
        </div>
      </div>

      {isMobile&&(
        <div style={{background:"#fff",borderTop:`1.5px solid ${C.tealPale}`,display:"flex",flexShrink:0,boxShadow:"0 -2px 8px rgba(0,0,0,.06)"}}>
          {TABS.map(t=><BottomTab key={t.id} icon={t.icon} label={t.label} active={nav===t.id} onClick={()=>setNav(t.id)} badge={t.badge}/>)}
        </div>
      )}

      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(BrillaTeacherDashboard));
</script>
</body>
</html>
