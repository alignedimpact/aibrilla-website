// ── ROADMAP GENERATOR ─────────────────────────────────────────────────────
function generateRoadmap(lesson) {
  const n = parseInt(lesson) || 18;
  return {
    lesson: n,
    objective:"Students will use the concept of equal groups to understand division as splitting a total into equal-sized parts.",
    phases:[
      { name:"Launch (8 min)",  icon:"🚀", content:`Open with a real scenario: "I have 24 pencils and need equal groups of 4. How many groups?" Give 60 seconds of quiet think time. Then partner talk — no cold calls.`, mlMove:"Give A1, B4, and C5 the sentence frame: 'I think there will be ___ groups because ___.' Post it visually." },
      { name:"Explore (15 min)",icon:"🔍", content:`Pairs: A1 with C3. B3 with A4. D4 with A2 (give D4 the explainer role). C2 with B5. Students work the task together with materials.`, mlMove:"Circulate to C5 and B1 first. Offer drawing before writing. Accept home language in partner talk." },
      { name:"Discuss (10 min)",icon:"💬", content:`Sequence: Start with A4's drawing. Move to B3's explanation. End with D4's verbal justification. Concrete to abstract.`, mlMove:"30 seconds prep time before calling on anyone. Tell D4 specifically: 'I am starting with you.' Use Stronger and Clearer routine." },
      { name:"Close (7 min)",   icon:"✅", content:`Exit ticket: 'Explain what it means to divide.' Accept drawings, equations, or sentences in any language.`, mlMove:"For A1, B6, and C5: offer 'Division means ___ because ___.' Collect before tomorrow." },
    ],
    mlSnapshot:[
      { code:"A1", name:"Sofia",  flag:"No cold calls · Processing time · Sentence frame ready"         },
      { code:"B3", name:"Amara",  flag:"Accept drawing as evidence · Sketchpad thinker"                 },
      { code:"C2", name:"Diego",  flag:"Bilingual toggle decreasing · Ready to lead discourse"           },
      { code:"D4", name:"Marcus", flag:"Give explicit discussion role · Ready to articulate strategy"   },
    ],
    mlr:"Stronger and Clearer Each Time (MLR1). After partner talk, ask one student to share, then say: 'Make that idea stronger. Add a because.' Repeat once.",
  };
}

// ── HOOK: SCREEN WIDTH ────────────────────────────────────────────────────
function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mobile;
}

// ── NAV ITEM (sidebar) ────────────────────────────────────────────────────

      <span style={{ fontSize:20 }}>{icon}</span>
      <span style={{ fontSize:15, fontWeight:active?800:600 }}>{label}</span>
      {badge && <span style={{ marginLeft:"auto", background:"#e53935", color:"#fff", fontSize:11, fontWeight:900, padding:"3px 8px", borderRadius:20, minWidth:20, textAlign:"center" }}>{badge}</span>}
      {active && <div style={{ position:"absolute", left:0, top:"20%", bottom:"20%", width:4, borderRadius:"0 4px 4px 0", background:C.teal }}/>}
    </button>
  );
}

// ── BOTTOM TAB (mobile) ───────────────────────────────────────────────────
function BottomTab({ icon, label, active, onClick, badge }) {
  return (
    <button onClick={onClick} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"10px 4px", border:"none", background:"none", cursor:"pointer", color:active?C.teal:C.textLt, borderTop:`3px solid ${active?C.teal:"transparent"}`, position:"relative" }}>

      <span style={{ fontSize:10, fontWeight:active?800:600 }}>{label}</span>

          {badge}
        </span>
      )}
    </button>
  );
}

// ── STATUS BADGE ──────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  const map = { brilla:{label:"With Brilla",bg:C.tealPale,color:C.teal,dot:"🌱"}, cfu:{label:"CFU",bg:C.amberPale,color:C.amberDeep,dot:"⏳"}, independent:{label:"Independent",bg:"#eef7ee",color:"#2d7a2d",dot:"✓"} };
  const s = map[status]||map.brilla;
  return <span style={{ padding:"4px 10px", borderRadius:20, fontSize:12, fontWeight:700, background:s.bg, color:s.color }}>{s.dot} {s.label}</span>;
}

// ═════════════════════════════════════════════════════════════════════════
function BrillaTeacherDashboard() {
  const isMobile = useIsMobile();
  const [nav, setNav]               = useState("overview");
  const [fw, setFw]                 = useState("caeld");
  const [lessonInput, setLessonInput] = useState("");
  const [roadmap, setRoadmap]       = useState(null);
  const [generating, setGenerating] = useState(false);
  const [reflectMsgs, setReflectMsgs] = useState([]);
  const [reflectInput, setReflectInput] = useState("");
  const [reflectTyping, setReflectTyping] = useState(false);
  const [reflectStep, setReflectStep] = useState(0);
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [heatFilter, setHeatFilter] = useState("all");
  const [familyMessages, setFamilyMessages] = useState(FAMILY_MESSAGES);
  const [lessonConfirmed, setLessonConfirmed] = useState(false);
  const [selectedModule, setSelectedModule] = useState("");
  const [selectedLesson, setSelectedLesson] = useState("");
  const [newsletterPending, setNewsletterPending] = useState(true);
  const [newsletterConfirmed, setNewsletterConfirmed] = useState(false);

  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [reflectMsgs]);

  const unreadFamily = familyMessages.filter(m => !m.read).length;
  const statusCounts = { brilla:STUDENTS.filter(s=>s.status==="brilla").length, cfu:STUDENTS.filter(s=>s.status==="cfu").length, independent:STUDENTS.filter(s=>s.status==="independent").length };
  const heatStudents = heatFilter==="all" ? STUDENTS : STUDENTS.filter(s=>s.status===heatFilter);
  const currentModule = CURRICULUM.modules.find(m=>m.id===selectedModule);
  const currentLesson = currentModule?.lessons.find(l=>l.id===selectedLesson);

  const card = (extra={}) => ({ background:"#fff", borderRadius:18, border:`2px solid ${C.tealPale}`, padding:"20px 22px", marginBottom:16, boxShadow:"0 2px 8px rgba(42,122,111,.05)", ...extra });

  function markAllRead() { setFamilyMessages(prev => prev.map(m => ({ ...m, read:true }))); }
  function sendReflect() {
    const text = reflectInput.trim();
    if (!text || reflectTyping) return;
    setReflectInput("");
    setReflectMsgs(prev => [...prev, { from:"teacher", text }]);
    setReflectTyping(true);
    setTimeout(() => {
      setReflectTyping(false);
      setReflectMsgs(prev => [...prev, { from:"ai", text:REFLECT_TURNS[Math.min(reflectStep, REFLECT_TURNS.length-1)] }]);
      setReflectStep(s => Math.min(s+1, REFLECT_TURNS.length-1));
    }, 1300);
  }

  // ── OVERVIEW ─────────────────────────────────────────────────────────────
  const OverviewPage = () => (
    <div style={{ padding:"20px 16px 40px" }}>
      <div style={{ fontSize:isMobile?20:24, fontWeight:900, color:C.navy, marginBottom:4 }}>Good morning, {TEACHER.name} ☀️</div>
      <div style={{ fontSize:14, color:C.textMid, marginBottom:20 }}>Grade {TEACHER.grade} · Room {TEACHER.room} · {TEACHER.school}</div>

      {/* Morning prompts */}
      {!lessonConfirmed && (
        <div style={{ ...card(), border:`2px solid ${C.amber}66`, background:C.amberPale }}>
          <div style={{ fontSize:14, fontWeight:800, color:C.amberDeep, marginBottom:12 }}>📐 What are you teaching today?</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:C.textMid, marginBottom:6 }}>Module / Unit</div>
              <select value={selectedModule} onChange={e=>{setSelectedModule(e.target.value);setSelectedLesson("");}}
                style={{ width:"100%", padding:"11px 14px", borderRadius:12, border:`2px solid ${C.tealPale}`, fontSize:15, fontFamily:"inherit", color:C.text, background:"#fff", outline:"none" }}>
                <option value="">Select...</option>
                {CURRICULUM.modules.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
            </div>
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:C.textMid, marginBottom:6 }}>Lesson</div>
              <select value={selectedLesson} onChange={e=>setSelectedLesson(e.target.value)} disabled={!selectedModule}
                style={{ width:"100%", padding:"11px 14px", borderRadius:12, border:`2px solid ${C.tealPale}`, fontSize:15, fontFamily:"inherit", color:C.text, background:"#fff", outline:"none", opacity:!selectedModule?.5:1 }}>
                <option value="">Select...</option>
                {currentModule?.lessons.map(l=><option key={l.id} value={l.id}>{l.label}</option>)}
              </select>
            </div>
          </div>
          <button onClick={()=>{ if(selectedModule&&selectedLesson) setLessonConfirmed(true); }}
            disabled={!selectedModule||!selectedLesson}
            style={{ width:"100%", padding:"13px", borderRadius:12, background:(!selectedModule||!selectedLesson)?"#e8e8e8":C.teal, color:(!selectedModule||!selectedLesson)?C.textLt:"#fff", border:"none", fontWeight:800, fontSize:15, cursor:(!selectedModule||!selectedLesson)?"not-allowed":"pointer" }}>
            Confirm Today's Lesson →
          </button>
        </div>
      )}

      {lessonConfirmed && (
        <div style={{ ...card(), background:C.tealPale, border:`2px solid ${C.teal}44`, marginBottom:16 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize:12, fontWeight:800, color:C.teal, letterSpacing:.5, textTransform:"uppercase", marginBottom:4 }}>Today's Lesson ✓</div>
              <div style={{ fontSize:15, fontWeight:800, color:C.navy }}>{currentModule?.label.split("·")[1]?.trim()} · {currentLesson?.label}</div>

            <button onClick={()=>setLessonConfirmed(false)} style={{ fontSize:13, color:C.teal, background:"none", border:"none", cursor:"pointer", fontWeight:700 }}>Change</button>
          </div>
          {/* Newsletter prompt */}
          {currentLesson?.hasNewsletter && newsletterPending && !newsletterConfirmed && (

            </div>
          )}
          {newsletterConfirmed && (
            <div style={{ marginTop:10, padding:"8px 12px", background:"rgba(42,122,111,.1)", borderRadius:10, fontSize:13, fontWeight:700, color:C.teal }}>

          {currentLesson && !currentLesson.hasNewsletter && (

      {/* Unread family messages prompt */}

          <div style={{ marginLeft:"auto", fontSize:20, color:"#e53935" }}>›</div>

      {/* Class status */}
      <div style={card()}>

      <div style={{ fontSize:16, fontWeight:800, color:C.navy, marginBottom:12, marginTop:8 }}>Outreach History</div>
      {OUTREACH_LOG.map((log,i)=>(
        <div key={i} style={{ ...card({ marginBottom:10, padding:"14px 18px" }) }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
            <div>
              <div style={{ fontSize:14, fontWeight:800, color:C.navy }}>{log.lesson}</div>
              <div style={{ fontSize:12, color:C.textLt }}>{log.date}</div>
            </div>
            {log.newsletterDeployed&&<span style={{ fontSize:11, fontWeight:700, background:C.tealPale, color:C.teal, padding:"3px 10px", borderRadius:20 }}>📬 Newsletter sent</span>}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            {[{label:"Texts sent",val:log.sent},{label:"Delivered",val:log.delivered},{label:"Mood signals",val:log.moodResponses}].map(({label,val})=>(
              <div key={label} style={{ background:C.creamMid, borderRadius:10, padding:"10px 8px", textAlign:"center" }}>
                <div style={{ fontSize:18, fontWeight:900, color:C.teal }}>{val}</div>
                <div style={{ fontSize:11, color:C.textMid, marginTop:2 }}>{label}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );

  const TABS = [
    { id:"overview", icon:"📊", label:"Overview"  },
    { id:"roadmap",  icon:"🗺️", label:"Roadmap"   },
    { id:"heatmap",  icon:"🔥", label:"Heatmap"   },
    { id:"language", icon:"📈", label:"Language"  },
    { id:"family",   icon:"💬", label:"Family",    badge: unreadFamily>0?unreadFamily:null },
  ];

  return (
    <div style={{ fontFamily:"'Nunito', sans-serif", background:C.cream, height:"100vh", display:"flex", flexDirection:"column" }}>

      {/* TOP BAR */}
      <div style={{ background:C.navy, padding:"12px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0, boxShadow:"0 2px 10px rgba(27,58,107,.2)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:38, height:38, borderRadius:"50%", background:`linear-gradient(135deg,${C.teal},${C.tealMid})`, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:900, fontSize:14 }}>MR</div>
          <div>
            <div style={{ fontSize:16, fontWeight:900, color:"#fff" }}>{TEACHER.name}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.6)" }}>Grade {TEACHER.grade} · Room {TEACHER.room} · {TEACHER.framework}</div>
          </div>
        </div>
        {lessonConfirmed&&(
          <div style={{ padding:"7px 14px", borderRadius:20, background:"rgba(255,255,255,.12)", border:"1px solid rgba(255,255,255,.2)", fontSize:12, fontWeight:700, color:"#fff" }}>
            📐 {currentLesson?.label.split("·")[0]?.trim()}
          </div>
        )}
        {unreadFamily>0&&(
          <button onClick={()=>setNav("family")} style={{ width:32, height:32, borderRadius:"50%", background:"#e53935", border:"none", color:"#fff", fontWeight:900, fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
            {unreadFamily}
          </button>
        )}
      </div>

      {/* BODY */}
      <div style={{ flex:1, display:"flex", overflow:"hidden", minHeight:0 }}>
        {/* DESKTOP SIDEBAR */}
        {!isMobile&&(
          <div style={{ width:210, background:"#fff", borderRight:`2px solid ${C.tealPale}`, padding:"16px 10px 24px", display:"flex", flexDirection:"column", gap:3, flexShrink:0, overflowY:"auto" }}>
            <div style={{ fontSize:10, fontWeight:900, color:C.textLt, letterSpacing:1, textTransform:"uppercase", padding:"0 8px", marginBottom:8 }}>Teacher Dashboard</div>
            {TABS.map(t=><SideNavItem key={t.id} icon={t.icon} label={t.label} active={nav===t.id} onClick={()=>setNav(t.id)} badge={t.badge}/>)}
            <div style={{ flex:1 }}/>
            <div style={{ borderTop:`1px solid ${C.tealPale}`, paddingTop:12 }}>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {[{label:"With Brilla",count:statusCounts.brilla,color:C.teal,bg:C.tealPale},{label:"CFU",count:statusCounts.cfu,color:C.amberDeep,bg:C.amberPale},{label:"Independent",count:statusCounts.independent,color:"#2d7a2d",bg:"#eef7ee"}].map(({label,count,color,bg})=>(
                  <div key={label} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 10px", borderRadius:10, background:bg }}>
                    <span style={{ fontSize:13, fontWeight:600, color }}>{label}</span>
                    <span style={{ fontSize:16, fontWeight:900, color }}>{count}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* MAIN */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", minHeight:0, overflowY:nav==="reflect"?"hidden":"auto" }}>
          {nav==="overview" && <OverviewPage/>}
          {nav==="roadmap"  && <RoadmapPage/>}
          {nav==="reflect"  && <ReflectPage/>}
          {nav==="heatmap"  && <HeatmapPage/>}
          {nav==="language" && <LanguagePage/>}
          {nav==="family"   && <FamilyPage/>}
        </div>
      </div>

      {/* MOBILE BOTTOM TAB BAR */}
      {isMobile&&(
        <div style={{ background:"#fff", borderTop:`1.5px solid ${C.tealPale}`, display:"flex", flexShrink:0, boxShadow:"0 -2px 8px rgba(0,0,0,.06)" }}>
          {TABS.map(t=><BottomTab key={t.id} icon={t.icon} label={t.label} active={nav===t.id} onClick={()=>setNav(t.id)} badge={t.badge}/>)}
        </div>
      )}

      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}`}</style>
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(BrillaTeacherDashboard));
</script>
</body>
</html>
